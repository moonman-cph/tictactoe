<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant — Teampura</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="ai.css">
</head>
<body>

<nav id="left-nav"></nav>
<script src="shared-auth.js"></script>
<script src="shared-nav.js"></script>

<div id="app-content">
  <div id="app-header">
    <div class="header-crumb">
      <span class="header-crumb-root">Teampura</span>
      <span class="header-crumb-sep">/</span>
      <span class="header-crumb-current">AI Assistant</span>
    </div>
    <div class="header-spacer"></div>
  </div>
  <div id="main">

    <!-- Empty state (shown on load) -->
    <div id="ai-empty">
      <div class="ai-icon">✦</div>
      <h1 class="ai-title">Teampura AI</h1>
      <p class="ai-subtitle">Ask anything about your organisation</p>
      <p class="ai-subtitle" style="margin-top:2px;opacity:0.75;">Powered by Claude &middot; Your data stays private</p>

      <div id="ai-chips-wrap">
        <div class="ai-chips">
          <button class="ai-chip" data-prompt="Who has the highest salary?">
            <div class="ai-chip-icon">💰</div>
            <div class="ai-chip-text">Who has the highest salary?</div>
          </button>
          <button class="ai-chip" data-prompt="Which is the largest team?">
            <div class="ai-chip-icon">👥</div>
            <div class="ai-chip-text">Which is the largest team?</div>
          </button>
          <button class="ai-chip" data-prompt="Are there any pay gap issues?">
            <div class="ai-chip-icon">⚖️</div>
            <div class="ai-chip-text">Are there any pay gap issues?</div>
          </button>
          <button class="ai-chip" data-prompt="How many levels of management are there?">
            <div class="ai-chip-icon">🏗️</div>
            <div class="ai-chip-text">How many levels of management are there?</div>
          </button>
        </div>
        <div class="ai-input-area">
          <div class="ai-input-wrap" id="empty-input-wrap">
            <input class="ai-input" id="empty-input" type="text" placeholder="Ask a question about your org…" autocomplete="off" disabled>
            <button class="ai-send-btn" id="empty-send-btn" disabled title="Send">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="13" x2="8" y2="3"/>
                <polyline points="4,7 8,3 12,7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat state (hidden until first message) -->
    <div id="ai-chat" style="display:none;">
      <div class="ai-messages" id="ai-messages"></div>
      <div class="ai-input-area">
        <div class="ai-input-wrap" id="chat-input-wrap">
          <input class="ai-input" id="chat-input" type="text" placeholder="Ask a follow-up question…" autocomplete="off">
          <button class="ai-send-btn" id="chat-send-btn" disabled title="Send">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="13" x2="8" y2="3"/>
              <polyline points="4,7 8,3 12,7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const emptyState   = document.getElementById('ai-empty');
  const chatState    = document.getElementById('ai-chat');
  const messagesEl   = document.getElementById('ai-messages');
  const emptyInput   = document.getElementById('empty-input');
  const emptySendBtn = document.getElementById('empty-send-btn');
  const chatInput    = document.getElementById('chat-input');
  const chatSendBtn  = document.getElementById('chat-send-btn');
  const chipsWrap    = document.getElementById('ai-chips-wrap');

  // ── State ──────────────────────────────────────────────────────────────────
  let busy = false;
  let currentPersonId   = null;
  let conversationHistory = [];

  // Serialise apply operations — only one runs at a time to avoid race conditions
  // where two concurrent fetches both see the pre-change state and overwrite each other.
  let _applyQueue = Promise.resolve();
  function queueApply(fn) {
    _applyQueue = _applyQueue.then(fn).catch(() => {});
    return _applyQueue;
  }

  // ── Markdown renderer ──────────────────────────────────────────────────────
  function renderMarkdown(text) {
    function inlineMd(s) {
      s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
      return s;
    }

    const lines   = text.split('\n');
    const output  = [];
    let listItems = [];

    function flushList() {
      if (!listItems.length) return;
      output.push('<ul style="margin:6px 0;padding-left:20px;line-height:1.75">'
        + listItems.map(i => '<li>' + i + '</li>').join('')
        + '</ul>');
      listItems = [];
    }

    for (const line of lines) {
      const t = line.trim();

      if (!t) { flushList(); output.push(''); continue; }

      // Headers → bold spans (keep font size consistent with chat bubble)
      if (/^#{1,3} /.test(t)) {
        flushList();
        output.push('<strong>' + inlineMd(t.replace(/^#{1,3} /, '')) + '</strong>');
        continue;
      }

      // List items
      const li = t.match(/^[-•*] (.+)/) || t.match(/^\d+\. (.+)/);
      if (li) { listItems.push(inlineMd(li[1])); continue; }

      flushList();
      output.push(inlineMd(t));
    }
    flushList();

    return output.join('<br>').replace(/(<br>\s*){3,}/g, '<br><br>');
  }

  // ── Auth-driven identity ───────────────────────────────────────────────────
  // Identity comes from the authenticated session, not a person selector.
  function applyAuth(user) {
    currentPersonId = user.personId || null;
    chipsWrap.classList.remove('locked');
    emptyInput.disabled = false;
  }

  if (window.__currentUser) {
    applyAuth(window.__currentUser);
  } else {
    document.addEventListener('auth:ready', e => applyAuth(e.detail));
  }

  // ── Input enable/disable ───────────────────────────────────────────────────
  emptyInput.addEventListener('input', function () {
    emptySendBtn.disabled = !this.value.trim();
  });
  chatInput.addEventListener('input', function () {
    chatSendBtn.disabled = !this.value.trim();
  });

  // ── Chat helpers ───────────────────────────────────────────────────────────
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'ai-msg-user';
    const bubble = document.createElement('div');
    bubble.className = 'ai-msg-user-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'ai-msg-ai';
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.textContent = '✦';
    const bubble = document.createElement('div');
    bubble.className = 'ai-bubble ai-typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function replaceTypingWithResponse(typingRow, html) {
    const bubble = typingRow.querySelector('.ai-bubble');
    bubble.classList.remove('ai-typing');
    bubble.innerHTML = html;
    scrollBottom();
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  // Generate the next numeric ID for an array of entities.
  // The orgchart uses numeric IDs throughout (nextRoleId, Math.max, etc.) — mixing
  // in UUID strings causes Math.max(...ids) to return NaN and breaks rendering.
  function nextNumericId(arr) {
    let max = 0;
    for (const e of (arr || [])) {
      const n = Number(e.id);
      if (isFinite(n) && n > max) max = n;
    }
    return max + 1;
  }

  function canApplyAction(action) {
    const rights = (window.__currentUser && window.__currentUser.rights) || [];
    if (action._type === 'org_action') {
      const op = action.operation || '';
      if (['create_person', 'delete_person'].includes(op)) return rights.includes('edit_directory');
      return rights.includes('edit_org_chart');
    }
    return ['edit_org_chart', 'edit_directory', 'edit_salaries'].some(r => rights.includes(r));
  }

  function describeOrgAction(action) {
    switch (action.operation) {
      case 'create_department':
        return `Create department <strong>${escHtml(action.departmentName)}</strong>`;
      case 'delete_department':
        return `Delete department <strong>${escHtml(action.entityName)}</strong>`;
      case 'create_role': {
        let s = `Create role <strong>${escHtml(action.roleTitle)}</strong>`;
        if (action.roleLevel) s += ` (${escHtml(action.roleLevel)})`;
        return s;
      }
      case 'delete_role':
        return `Delete role <strong>${escHtml(action.entityName)}</strong>`;
      case 'move_role': {
        let s = `Move <strong>${escHtml(action.entityName)}</strong>`;
        if (action.newDepartmentName) s += ` to <strong>${escHtml(action.newDepartmentName)}</strong> department`;
        if (action.newManagerRoleName) s += ` to report to <strong>${escHtml(action.newManagerRoleName)}</strong>`;
        else if (action.newManagerRoleId === null) s += `, make top-level (no manager)`;
        return s;
      }
      case 'create_person':
        return `Add new person <strong>${escHtml(action.personName)}</strong>`;
      case 'delete_person':
        return `Remove <strong>${escHtml(action.entityName)}</strong> from the organisation`;
      default:
        return `Structural change: ${escHtml(action.operation)}`;
    }
  }

  function appendActionCard(action) {
    const isOrgAction = action._type === 'org_action';
    const canApply    = canApplyAction(action);

    let detail;
    if (isOrgAction) {
      detail = describeOrgAction(action);
    } else {
      const fieldLabel = action.field.replace(/_/g, ' ');
      const fmtVal = v => {
        if (action.field === 'salary' && typeof v === 'number') return v.toLocaleString();
        return String(v ?? '');
      };
      detail = action.currentValue != null
        ? `<strong>${escHtml(action.entityName)}</strong>'s ${fieldLabel}: ${fmtVal(action.currentValue)} → ${fmtVal(action.newValue)}`
        : `Set <strong>${escHtml(action.entityName)}</strong>'s ${fieldLabel} to ${fmtVal(action.newValue)}`;
    }

    const card = document.createElement('div');
    card.className = 'ai-action-card';
    card.innerHTML = `
      <div class="ai-action-inner">
        <div class="ai-action-header">Suggested change</div>
        <div class="ai-action-detail">${detail}</div>
        <div class="ai-action-reason">Reason: ${escHtml(action.reason)}</div>
        <div class="ai-action-btns">
          ${canApply
            ? '<button class="ai-action-apply-btn">Apply change</button>'
            : '<span class="ai-action-no-perm" title="You do not have permission to apply this change">View only</span>'}
          <button class="ai-action-dismiss-btn">Dismiss</button>
        </div>
      </div>
    `;

    if (canApply) card.querySelector('.ai-action-apply-btn').addEventListener('click', function () {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Applying…';
      // Disable all other pending apply buttons while this runs to prevent race conditions
      document.querySelectorAll('.ai-action-apply-btn:not(:disabled)').forEach(b => { b.disabled = true; b.dataset.queued = '1'; });
      queueApply(async () => {
        try {
          if (isOrgAction) {
            await applyOrgAction(action);
          } else {
            await applyAction(action);
          }
          card.querySelector('.ai-action-btns').innerHTML = '<span class="ai-action-applied">✓ Applied</span>';
        } catch (e) {
          card.querySelector('.ai-action-btns').innerHTML =
            '<span class="ai-action-error">Failed: ' + escHtml(e.message) + '</span>' +
            '<button class="ai-action-dismiss-btn" style="margin-left:8px">Dismiss</button>';
          card.querySelector('.ai-action-dismiss-btn').addEventListener('click', () => card.remove());
        } finally {
          // Re-enable any queued apply buttons
          document.querySelectorAll('.ai-action-apply-btn[data-queued]').forEach(b => { b.disabled = false; delete b.dataset.queued; });
        }
      });
    });

    card.querySelector('.ai-action-dismiss-btn').addEventListener('click', function () {
      card.remove();
    });

    messagesEl.appendChild(card);
    scrollBottom();
  }

  async function applyAction(action) {
    const data = await fetch('/api/v1/data', { credentials: 'same-origin' }).then(r => r.json());
    const key  = { person: 'persons', role: 'roles', department: 'departments' }[action.entityType];
    if (!key || !data[key]) throw new Error('Unknown entity type: ' + action.entityType);
    const entity = data[key].find(e => String(e.id) === String(action.entityId));
    if (!entity) throw new Error(action.entityName + ' not found');
    entity[action.field] = action.newValue;
    const resp = await fetch('/api/v1/data', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {
        'Content-Type':    'application/json',
        'X-Change-Reason': '[AI suggestion] ' + action.reason.slice(0, 480),
        'X-Source':        'ai',
      },
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || resp.statusText);
    }
  }

  async function applyOrgAction(action) {
    const data = await fetch('/api/v1/data', { credentials: 'same-origin' }).then(r => r.json());

    switch (action.operation) {
      case 'create_department': {
        data.departments = data.departments || [];
        data.departments.push({
          id:          nextNumericId(data.departments),
          orgId:       'default',
          name:        action.departmentName,
          color:       action.departmentColor || '#6366f1',
          description: '',
          headRoleId:  null,
        });
        break;
      }
      case 'delete_department': {
        const hasRoles = (data.roles || []).some(r => String(r.departmentId) === String(action.entityId));
        if (hasRoles) throw new Error('This department still has roles. Move or delete them first.');
        data.departments = (data.departments || []).filter(d => String(d.id) !== String(action.entityId));
        break;
      }
      case 'create_role': {
        data.roles = data.roles || [];
        // Resolve department: the AI should send an ID, but may send a name — handle both
        let deptId = action.roleDepartmentId || null;
        if (deptId != null) {
          const byId = (data.departments || []).find(d => String(d.id) === String(deptId));
          if (byId) {
            deptId = byId.id; // preserve native type (number for existing depts, number for AI-created after nextNumericId)
          } else {
            const byName = (data.departments || []).find(d => d.name.toLowerCase() === String(deptId).toLowerCase());
            if (byName) deptId = byName.id;
          }
        }
        if (deptId == null) throw new Error('Could not resolve department for the new role. Please specify a valid department.');
        data.roles.push({
          id:            nextNumericId(data.roles),
          orgId:         'default',
          title:         action.roleTitle,
          level:         action.roleLevel || null,
          departmentId:  deptId,
          managerRoleId: action.roleManagerRoleId || null,
          teamId:        null,
        });
        break;
      }
      case 'delete_role': {
        const hasReports = (data.roles || []).some(r => String(r.managerRoleId) === String(action.entityId));
        if (hasReports) throw new Error('This role has direct reports. Reassign them first.');
        data.roles = (data.roles || []).filter(r => String(r.id) !== String(action.entityId));
        data.roleAssignments = (data.roleAssignments || []).filter(a => String(a.roleId) !== String(action.entityId));
        break;
      }
      case 'move_role': {
        const role = (data.roles || []).find(r => String(r.id) === String(action.entityId));
        if (!role) throw new Error(action.entityName + ' not found');
        if (action.newDepartmentId) {
          // Resolve by ID first, fall back to name
          const byId = (data.departments || []).find(d => String(d.id) === String(action.newDepartmentId));
          if (byId) {
            role.departmentId = byId.id; // preserve native type
          } else {
            const byName = (data.departments || []).find(d => d.name.toLowerCase() === String(action.newDepartmentId).toLowerCase());
            if (byName) role.departmentId = byName.id;
            else throw new Error('Could not resolve new department: ' + action.newDepartmentId);
          }
        }
        if ('newManagerRoleId' in action) role.managerRoleId = action.newManagerRoleId || null;
        break;
      }
      case 'create_person': {
        const newId = nextNumericId(data.persons);
        data.persons = data.persons || [];
        data.persons.push({
          id:     newId,
          orgId:  'default',
          name:   action.personName,
          salary: action.personSalary || null,
          gender: null,
        });
        if (action.personRoleId) {
          data.roleAssignments = data.roleAssignments || [];
          data.roleAssignments.push({ id: nextNumericId(data.roleAssignments), roleId: action.personRoleId, personId: newId });
        }
        break;
      }
      case 'delete_person': {
        data.persons = (data.persons || []).filter(p => String(p.id) !== String(action.entityId));
        data.roleAssignments = (data.roleAssignments || []).filter(a => String(a.personId) !== String(action.entityId));
        break;
      }
      default:
        throw new Error('Unknown operation: ' + action.operation);
    }

    const resp = await fetch('/api/v1/data', {
      method: 'POST',
      credentials: 'same-origin',
      headers: {
        'Content-Type':    'application/json',
        'X-Change-Reason': '[AI suggestion] ' + (action.reason || '').slice(0, 480),
        'X-Source':        'ai',
      },
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || resp.statusText);
    }
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submitQuery(text) {
    if (!text || busy) return;
    busy = true;

    emptyState.style.display = 'none';
    chatState.style.display  = 'flex';

    appendUserMessage(text);
    emptyInput.value  = '';
    emptySendBtn.disabled = true;
    chatInput.value   = '';
    chatSendBtn.disabled  = true;

    const typingRow = appendTyping();

    try {
      const resp = await fetch('/api/v1/ai/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text, history: conversationHistory, personId: currentPersonId }),
      });

      const result = await resp.json();

      if (!resp.ok) {
        replaceTypingWithResponse(typingRow,
          '<em style="color:var(--text-secondary)">' + escHtml(result.error || 'Something went wrong.') + '</em>');
      } else {
        const html = result.response
          ? renderMarkdown(result.response)
          : '<em style="color:var(--text-secondary)">No response received.</em>';
        replaceTypingWithResponse(typingRow, html);

        conversationHistory.push(
          { role: 'user',      content: text },
          { role: 'assistant', content: result.response || '' }
        );
        if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);

        if (Array.isArray(result.actions) && result.actions.length) {
          result.actions.forEach(appendActionCard);
        }
      }
    } catch (e) {
      replaceTypingWithResponse(typingRow,
        '<em style="color:var(--text-secondary)">Network error. Please try again.</em>');
    }

    busy = false;
  }

  // ── Event bindings ─────────────────────────────────────────────────────────
  emptySendBtn.addEventListener('click',  () => submitQuery(emptyInput.value.trim()));
  emptyInput.addEventListener('keydown',  e => { if (e.key === 'Enter' && emptyInput.value.trim()) submitQuery(emptyInput.value.trim()); });
  chatSendBtn.addEventListener('click',   () => submitQuery(chatInput.value.trim()));
  chatInput.addEventListener('keydown',   e => { if (e.key === 'Enter' && chatInput.value.trim()) submitQuery(chatInput.value.trim()); });

  document.querySelectorAll('.ai-chip').forEach(chip => {
    chip.addEventListener('click', function () { submitQuery(this.dataset.prompt); });
  });

}());
</script>
<script src="/notifications.js"></script>

</body>
</html>
