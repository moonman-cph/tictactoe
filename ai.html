<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant — OrgChart</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="ai.css">
</head>
<body>

<nav id="left-nav"></nav>
<script src="shared-nav.js"></script>

<div id="app-content">
  <div id="app-header">
    <div class="header-crumb">
      <span class="header-crumb-root">OrgChart</span>
      <span class="header-crumb-sep">/</span>
      <span class="header-crumb-current">AI Assistant</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-divider"></div>
    <div class="header-avatar">DM</div>
  </div>
  <div id="main">

    <!-- Empty state (shown on load) -->
    <div id="ai-empty">
      <div class="ai-icon">✦</div>
      <h1 class="ai-title">OrgChart AI</h1>
      <p class="ai-subtitle">Ask anything about your organisation</p>
      <p class="ai-subtitle" style="margin-top:2px;opacity:0.75;">Powered by Claude &middot; Your data stays private</p>
      <div class="ai-chips">
        <button class="ai-chip" data-prompt="Who has the highest salary?">
          <div class="ai-chip-icon">💰</div>
          <div class="ai-chip-text">Who has the highest salary?</div>
        </button>
        <button class="ai-chip" data-prompt="Which is the largest team?">
          <div class="ai-chip-icon">👥</div>
          <div class="ai-chip-text">Which is the largest team?</div>
        </button>
        <button class="ai-chip" data-prompt="Are there any pay gap issues?">
          <div class="ai-chip-icon">⚖️</div>
          <div class="ai-chip-text">Are there any pay gap issues?</div>
        </button>
        <button class="ai-chip" data-prompt="Who is on leave?">
          <div class="ai-chip-icon">🏖️</div>
          <div class="ai-chip-text">Who is on leave?</div>
        </button>
      </div>
      <div class="ai-input-area">
        <div class="ai-input-wrap" id="empty-input-wrap">
          <input class="ai-input" id="empty-input" type="text" placeholder="Ask a question about your org…" autocomplete="off">
          <button class="ai-send-btn" id="empty-send-btn" disabled title="Send">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="13" x2="8" y2="3"/>
              <polyline points="4,7 8,3 12,7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Chat state (hidden until first message) -->
    <div id="ai-chat" style="display:none;">
      <div class="ai-messages" id="ai-messages"></div>
      <div class="ai-input-area">
        <div class="ai-input-wrap" id="chat-input-wrap">
          <input class="ai-input" id="chat-input" type="text" placeholder="Ask a follow-up question…" autocomplete="off">
          <button class="ai-send-btn" id="chat-send-btn" disabled title="Send">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="13" x2="8" y2="3"/>
              <polyline points="4,7 8,3 12,7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  // ── Mock response lookup ───────────────────────────────────────
  function getMockResponse(text) {
    const t = text.toLowerCase();
    if (/salary|paid|earn/.test(t)) {
      return 'The highest-paid employee is <strong>Sarah Chen</strong> (L8, Engineering) at <strong>$310,000/yr</strong>. She reports directly to the CEO and leads a team of 14. The next highest earners are James Wu (L8, Finance) at $295,000 and Priya Sharma (L7, Product) at $248,000.';
    }
    if (/team|largest|department|big/.test(t)) {
      return 'The largest department is <strong>Engineering</strong> with <strong>34 employees</strong> across 4 teams (Platform, Frontend, Data, and Infrastructure). It also has the highest total payroll at $4.2M annually. The second largest is Sales with 22 employees.';
    }
    if (/pay gap|gap|equity|gender/.test(t)) {
      return 'There is a <strong>12.4% gender pay gap</strong> — women earn 12.4% less than men on average. The gap is most pronounced in <strong>Engineering</strong> (18.2%) and <strong>Sales</strong> (14.7%). There are also 3 employees flagged as below their salary band, all in Customer Success.';
    }
    if (/leave|absence|off/.test(t)) {
      return 'There are currently <strong>4 employees on leave</strong>: Maria Santos (Marketing), Tom Eriksen (Engineering), Yuki Tanaka (HR), and Ben Okafor (Sales). Maria and Tom are on parental leave; Yuki and Ben are on medical leave.';
    }
    return 'I can see your organisation has <strong>127 employees</strong> across <strong>9 departments</strong>. I can answer questions about salaries, headcount, team structure, pay gaps, and org health. Try one of the suggested questions, or ask me anything!';
  }

  // ── DOM refs ───────────────────────────────────────────────────
  const emptyState   = document.getElementById('ai-empty');
  const chatState    = document.getElementById('ai-chat');
  const messagesEl   = document.getElementById('ai-messages');
  const emptyInput   = document.getElementById('empty-input');
  const emptySendBtn = document.getElementById('empty-send-btn');
  const chatInput    = document.getElementById('chat-input');
  const chatSendBtn  = document.getElementById('chat-send-btn');

  // ── Input enable/disable ───────────────────────────────────────
  emptyInput.addEventListener('input', function () {
    emptySendBtn.disabled = !this.value.trim();
  });
  chatInput.addEventListener('input', function () {
    chatSendBtn.disabled = !this.value.trim();
  });

  // ── Submit helpers ─────────────────────────────────────────────
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'ai-msg-user';
    const bubble = document.createElement('div');
    bubble.className = 'ai-msg-user-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'ai-msg-ai';
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.textContent = '✦';
    const bubble = document.createElement('div');
    bubble.className = 'ai-bubble ai-typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function replaceTypingWithResponse(typingRow, html) {
    const bubble = typingRow.querySelector('.ai-bubble');
    bubble.classList.remove('ai-typing');
    bubble.innerHTML = html;
    scrollBottom();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  let busy = false;

  function submitQuery(text) {
    if (!text || busy) return;
    busy = true;

    // Switch to chat state
    emptyState.style.display = 'none';
    chatState.style.display = 'flex';

    appendUserMessage(text);

    // Clear both inputs
    emptyInput.value = '';
    emptySendBtn.disabled = true;
    chatInput.value = '';
    chatSendBtn.disabled = true;

    const typingRow = appendTyping();

    setTimeout(function () {
      const response = getMockResponse(text);
      replaceTypingWithResponse(typingRow, response);
      busy = false;
    }, 1400);
  }

  // ── Event bindings ─────────────────────────────────────────────
  emptySendBtn.addEventListener('click', function () {
    submitQuery(emptyInput.value.trim());
  });

  emptyInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && this.value.trim()) submitQuery(this.value.trim());
  });

  chatSendBtn.addEventListener('click', function () {
    submitQuery(chatInput.value.trim());
  });

  chatInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && this.value.trim()) submitQuery(this.value.trim());
  });

  // Chips: populate input and auto-submit
  document.querySelectorAll('.ai-chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      const prompt = this.dataset.prompt;
      submitQuery(prompt);
    });
  });

}());
</script>
<script src="/notifications.js"></script>

</body>
</html>
