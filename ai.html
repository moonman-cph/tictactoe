<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant — Teampura</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="ai.css">
</head>
<body>

<nav id="left-nav"></nav>
<script src="shared-auth.js"></script>
<script src="shared-nav.js"></script>

<div id="app-content">
  <div id="app-header">
    <div class="header-crumb">
      <span class="header-crumb-root">Teampura</span>
      <span class="header-crumb-sep">/</span>
      <span class="header-crumb-current">AI Assistant</span>
    </div>
    <div class="header-spacer"></div>
  </div>
  <div id="main">

    <!-- Empty state (shown on load) -->
    <div id="ai-empty">
      <div class="ai-icon">✦</div>
      <h1 class="ai-title">Teampura AI</h1>
      <p class="ai-subtitle">Ask anything about your organisation</p>
      <p class="ai-subtitle" style="margin-top:2px;opacity:0.75;">Powered by Claude &middot; Your data stays private</p>

      <!-- Identity card — prominent, required before chatting -->
      <div id="ai-identity-card">
        <div class="ai-identity-card-row">
          <span class="ai-identity-label">You are:</span>
          <select id="ai-person-select" class="ai-person-select">
            <option value="">— select yourself —</option>
          </select>
        </div>
        <div id="ai-tier-badge-wrap" style="display:none">
          <span id="ai-tier-badge" class="ai-tier-badge"></span>
        </div>
      </div>

      <div id="ai-chips-wrap">
        <div class="ai-chips">
          <button class="ai-chip" data-prompt="Who has the highest salary?">
            <div class="ai-chip-icon">💰</div>
            <div class="ai-chip-text">Who has the highest salary?</div>
          </button>
          <button class="ai-chip" data-prompt="Which is the largest team?">
            <div class="ai-chip-icon">👥</div>
            <div class="ai-chip-text">Which is the largest team?</div>
          </button>
          <button class="ai-chip" data-prompt="Are there any pay gap issues?">
            <div class="ai-chip-icon">⚖️</div>
            <div class="ai-chip-text">Are there any pay gap issues?</div>
          </button>
          <button class="ai-chip" data-prompt="How many levels of management are there?">
            <div class="ai-chip-icon">🏗️</div>
            <div class="ai-chip-text">How many levels of management are there?</div>
          </button>
        </div>
        <div class="ai-input-area">
          <div class="ai-input-wrap" id="empty-input-wrap">
            <input class="ai-input" id="empty-input" type="text" placeholder="Select who you are above to start chatting…" autocomplete="off" disabled>
            <button class="ai-send-btn" id="empty-send-btn" disabled title="Send">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="13" x2="8" y2="3"/>
                <polyline points="4,7 8,3 12,7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat state (hidden until first message) -->
    <div id="ai-chat" style="display:none;">
      <!-- Subtle identity bar shown during chat -->
      <div id="ai-chat-identity">
        <span id="ai-chat-identity-name"></span>
        <span id="ai-chat-identity-badge" class="ai-tier-badge"></span>
        <button id="ai-chat-change-btn">Change</button>
      </div>
      <div class="ai-messages" id="ai-messages"></div>
      <div class="ai-input-area">
        <div class="ai-input-wrap" id="chat-input-wrap">
          <input class="ai-input" id="chat-input" type="text" placeholder="Ask a follow-up question…" autocomplete="off">
          <button class="ai-send-btn" id="chat-send-btn" disabled title="Send">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="13" x2="8" y2="3"/>
              <polyline points="4,7 8,3 12,7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  const LS_KEY_PERSON = 'aiCurrentPersonId';

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const emptyState         = document.getElementById('ai-empty');
  const chatState          = document.getElementById('ai-chat');
  const messagesEl         = document.getElementById('ai-messages');
  const emptyInput         = document.getElementById('empty-input');
  const emptySendBtn       = document.getElementById('empty-send-btn');
  const chatInput          = document.getElementById('chat-input');
  const chatSendBtn        = document.getElementById('chat-send-btn');
  const personSelect       = document.getElementById('ai-person-select');
  const tierBadge          = document.getElementById('ai-tier-badge');
  const tierBadgeWrap      = document.getElementById('ai-tier-badge-wrap');
  const chipsWrap          = document.getElementById('ai-chips-wrap');
  const chatIdentityName   = document.getElementById('ai-chat-identity-name');
  const chatIdentityBadge  = document.getElementById('ai-chat-identity-badge');
  const chatChangeBtn      = document.getElementById('ai-chat-change-btn');

  // ── State ──────────────────────────────────────────────────────────────────
  let busy = false;
  let currentPersonId   = localStorage.getItem(LS_KEY_PERSON) || '';
  let currentTier       = 'employee';
  let currentPersonName = '';
  let conversationHistory = [];

  // ── Markdown renderer ──────────────────────────────────────────────────────
  function renderMarkdown(text) {
    function inlineMd(s) {
      s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
      return s;
    }

    const lines   = text.split('\n');
    const output  = [];
    let listItems = [];

    function flushList() {
      if (!listItems.length) return;
      output.push('<ul style="margin:6px 0;padding-left:20px;line-height:1.75">'
        + listItems.map(i => '<li>' + i + '</li>').join('')
        + '</ul>');
      listItems = [];
    }

    for (const line of lines) {
      const t = line.trim();

      if (!t) { flushList(); output.push(''); continue; }

      // Headers → bold spans (keep font size consistent with chat bubble)
      if (/^#{1,3} /.test(t)) {
        flushList();
        output.push('<strong>' + inlineMd(t.replace(/^#{1,3} /, '')) + '</strong>');
        continue;
      }

      // List items
      const li = t.match(/^[-•*] (.+)/) || t.match(/^\d+\. (.+)/);
      if (li) { listItems.push(inlineMd(li[1])); continue; }

      flushList();
      output.push(inlineMd(t));
    }
    flushList();

    return output.join('<br>').replace(/(<br>\s*){3,}/g, '<br><br>');
  }

  // ── Person selector / tier ─────────────────────────────────────────────────
  async function loadPersons() {
    try {
      const data = await fetch('/api/data').then(r => r.json());
      const persons = (data.persons || []).slice().sort((a, b) => a.name.localeCompare(b.name));
      persons.forEach(p => {
        const opt = document.createElement('option');
        opt.value = String(p.id);
        opt.textContent = p.employeeId ? `${p.name} (${p.employeeId})` : p.name;
        if (String(p.id) === currentPersonId) opt.selected = true;
        personSelect.appendChild(opt);
      });
      if (currentPersonId) {
        const p = persons.find(p => String(p.id) === currentPersonId);
        if (p) currentPersonName = p.name;
        await refreshTier();
      }
      updateLockedState();
    } catch (e) {
      console.error('[ai] Failed to load persons:', e);
    }
  }

  async function refreshTier() {
    if (!currentPersonId) {
      tierBadgeWrap.style.display = 'none';
      currentTier = 'employee';
      return;
    }
    try {
      const info = await fetch('/api/v1/ai/whoami?personId=' + encodeURIComponent(currentPersonId)).then(r => r.json());
      currentTier = info.tier || 'employee';
      currentPersonName = info.personName || currentPersonName;
      const labels = { admin: 'HR Admin · Full access', manager: 'Manager', employee: 'Employee' };
      const label  = labels[currentTier] || currentTier;

      // Empty state badge
      tierBadge.textContent = label;
      tierBadge.className   = 'ai-tier-badge tier-' + currentTier;
      tierBadgeWrap.style.display = '';

      // Chat state badge
      chatIdentityName.textContent  = currentPersonName;
      chatIdentityBadge.textContent = label;
      chatIdentityBadge.className   = 'ai-tier-badge tier-' + currentTier;
    } catch (e) {
      console.error('[ai] whoami failed:', e);
    }
  }

  function updateLockedState() {
    const locked = !currentPersonId;
    chipsWrap.classList.toggle('locked', locked);
    emptyInput.disabled = locked;
    emptyInput.placeholder = locked
      ? 'Select who you are above to start chatting…'
      : 'Ask a question about your org…';
    // Only enable send when there's also text
    if (locked) emptySendBtn.disabled = true;
  }

  personSelect.addEventListener('change', async function () {
    currentPersonId = this.value;
    currentPersonName = this.options[this.selectedIndex]?.text || '';
    if (currentPersonId) {
      localStorage.setItem(LS_KEY_PERSON, currentPersonId);
    } else {
      localStorage.removeItem(LS_KEY_PERSON);
    }
    conversationHistory = [];
    messagesEl.innerHTML = '';
    emptyState.style.display = '';
    chatState.style.display  = 'none';
    await refreshTier();
    updateLockedState();
  });

  // "Change" button in chat state → back to empty state
  chatChangeBtn.addEventListener('click', function () {
    conversationHistory = [];
    messagesEl.innerHTML = '';
    emptyState.style.display = '';
    chatState.style.display  = 'none';
  });

  // ── Input enable/disable ───────────────────────────────────────────────────
  emptyInput.addEventListener('input', function () {
    emptySendBtn.disabled = !this.value.trim() || !currentPersonId;
  });
  chatInput.addEventListener('input', function () {
    chatSendBtn.disabled = !this.value.trim();
  });

  // ── Chat helpers ───────────────────────────────────────────────────────────
  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'ai-msg-user';
    const bubble = document.createElement('div');
    bubble.className = 'ai-msg-user-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'ai-msg-ai';
    const avatar = document.createElement('div');
    avatar.className = 'ai-avatar';
    avatar.textContent = '✦';
    const bubble = document.createElement('div');
    bubble.className = 'ai-bubble ai-typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function replaceTypingWithResponse(typingRow, html) {
    const bubble = typingRow.querySelector('.ai-bubble');
    bubble.classList.remove('ai-typing');
    bubble.innerHTML = html;
    scrollBottom();
  }

  function appendActionCard(action) {
    const fieldLabel = action.field.replace(/_/g, ' ');
    const fmtVal = v => {
      if (action.field === 'salary' && typeof v === 'number') return v.toLocaleString();
      return String(v ?? '');
    };
    const detail = action.currentValue != null
      ? `<strong>${escHtml(action.entityName)}</strong>'s ${fieldLabel}: ${fmtVal(action.currentValue)} → ${fmtVal(action.newValue)}`
      : `Set <strong>${escHtml(action.entityName)}</strong>'s ${fieldLabel} to ${fmtVal(action.newValue)}`;

    const card = document.createElement('div');
    card.className = 'ai-action-card';
    card.innerHTML = `
      <div class="ai-action-inner">
        <div class="ai-action-header">Suggested change</div>
        <div class="ai-action-detail">${detail}</div>
        <div class="ai-action-reason">Reason: ${escHtml(action.reason)}</div>
        <div class="ai-action-btns">
          <button class="ai-action-apply-btn">Apply change</button>
          <button class="ai-action-dismiss-btn">Dismiss</button>
        </div>
      </div>
    `;

    card.querySelector('.ai-action-apply-btn').addEventListener('click', async function () {
      this.disabled = true;
      this.textContent = 'Applying…';
      try {
        await applyAction(action);
        card.querySelector('.ai-action-btns').innerHTML = '<span class="ai-action-applied">✓ Applied</span>';
      } catch (e) {
        card.querySelector('.ai-action-btns').innerHTML = '<span class="ai-action-error">Failed: ' + escHtml(e.message) + '</span>';
      }
    });

    card.querySelector('.ai-action-dismiss-btn').addEventListener('click', function () {
      card.remove();
    });

    messagesEl.appendChild(card);
    scrollBottom();
  }

  async function applyAction(action) {
    const data = await fetch('/api/data').then(r => r.json());
    const key  = { person: 'persons', role: 'roles', department: 'departments' }[action.entityType];
    if (!key || !data[key]) throw new Error('Unknown entity type: ' + action.entityType);
    const entity = data[key].find(e => String(e.id) === String(action.entityId));
    if (!entity) throw new Error(action.entityName + ' not found');
    entity[action.field] = action.newValue;
    const resp = await fetch('/api/data', {
      method: 'POST',
      headers: {
        'Content-Type':   'application/json',
        'X-Change-Reason': '[AI suggestion] ' + action.reason.slice(0, 480),
        'X-Source':        'ai',
      },
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || resp.statusText);
    }
  }

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Submit ─────────────────────────────────────────────────────────────────
  async function submitQuery(text) {
    if (!text || busy || !currentPersonId) return;
    busy = true;

    emptyState.style.display = 'none';
    chatState.style.display  = 'flex';

    appendUserMessage(text);
    emptyInput.value  = '';
    emptySendBtn.disabled = true;
    chatInput.value   = '';
    chatSendBtn.disabled  = true;

    const typingRow = appendTyping();

    try {
      const resp = await fetch('/api/v1/ai/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: text, history: conversationHistory, personId: currentPersonId }),
      });

      const result = await resp.json();

      if (!resp.ok) {
        replaceTypingWithResponse(typingRow,
          '<em style="color:var(--text-secondary)">' + escHtml(result.error || 'Something went wrong.') + '</em>');
      } else {
        const html = result.response
          ? renderMarkdown(result.response)
          : '<em style="color:var(--text-secondary)">No response received.</em>';
        replaceTypingWithResponse(typingRow, html);

        conversationHistory.push(
          { role: 'user',      content: text },
          { role: 'assistant', content: result.response || '' }
        );
        if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);

        if (Array.isArray(result.actions) && result.actions.length) {
          result.actions.forEach(appendActionCard);
        }
      }
    } catch (e) {
      replaceTypingWithResponse(typingRow,
        '<em style="color:var(--text-secondary)">Network error. Please try again.</em>');
    }

    busy = false;
  }

  // ── Event bindings ─────────────────────────────────────────────────────────
  emptySendBtn.addEventListener('click',  () => submitQuery(emptyInput.value.trim()));
  emptyInput.addEventListener('keydown',  e => { if (e.key === 'Enter' && emptyInput.value.trim()) submitQuery(emptyInput.value.trim()); });
  chatSendBtn.addEventListener('click',   () => submitQuery(chatInput.value.trim()));
  chatInput.addEventListener('keydown',   e => { if (e.key === 'Enter' && chatInput.value.trim()) submitQuery(chatInput.value.trim()); });

  document.querySelectorAll('.ai-chip').forEach(chip => {
    chip.addEventListener('click', function () { submitQuery(this.dataset.prompt); });
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadPersons();

}());
</script>
<script src="/notifications.js"></script>

</body>
</html>
