<script>
// ── Data (file scope) ─────────────────────────────────────────────
let departments = [], roles = [], persons = [], roleAssignments = [],
    settings = { currency: 'DKK', hideSalaries: false, viewOnly: false },
    salaryBands = {};

// ── Helpers (file scope — reference data variables above) ─────────
function fmt(n) {
  if (!n) return settings.currency === 'EUR' ? '€0' : '0 kr';
  const rounded = Math.round(n);
  if (rounded >= 1_000_000)
    return settings.currency === 'EUR' ? '€' + (rounded/1_000_000).toFixed(1) + 'M' : (rounded/1_000_000).toFixed(1) + 'M kr';
  if (rounded >= 1000)
    return settings.currency === 'EUR' ? '€' + Math.round(rounded/1000) + 'k' : Math.round(rounded/1000) + 'k kr';
  return settings.currency === 'EUR' ? '€' + rounded.toLocaleString('en-US') : rounded.toLocaleString('da-DK') + ' kr';
}
function fmtFull(n) {
  if (!n) return settings.currency === 'EUR' ? '€0/mo' : '0 kr/mo';
  return settings.currency === 'EUR'
    ? '€' + Math.round(n).toLocaleString('en-US') + '/mo'
    : Math.round(n).toLocaleString('da-DK') + ' kr/mo';
}
function getPersonForRole(roleId) {
  const a = roleAssignments.find(a => a.roleId === roleId);
  return a ? persons.find(p => p.id === a.personId) || null : null;
}
function maxDepth(roleId, memo) {
  if (memo[roleId] !== undefined) return memo[roleId];
  const children = roles.filter(r => r.managerRoleId === roleId);
  memo[roleId] = children.length ? 1 + Math.max(...children.map(c => maxDepth(c.id, memo))) : 1;
  return memo[roleId];
}
function genderKey(person) {
  const g = (person.gender || '').toLowerCase().trim();
  if (g === 'male' || g === 'm') return 'male';
  if (g === 'female' || g === 'f') return 'female';
  if (g === '') return 'unknown';
  return 'other';
}
function levelSortKey(lvl) {
  if (!lvl) return 999;
  const m = lvl.toUpperCase().match(/[CL](\d+)/);
  if (m) return 100 - parseInt(m[1], 10);
  if (/VP|VICE/i.test(lvl)) return 3;
  if (/DIR/i.test(lvl)) return 10;
  if (/CHIEF|C[EFO]O/i.test(lvl)) return 1;
  return 50;
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }

async function init() {
  const overlay = document.getElementById('loading-overlay');
  let simActive = false;
  let saved = {};
  try {
    // Check for active simulation first; fall back to live data
    const simRes = await fetch('/api/sim-data');
    const dataRes = simRes.ok ? simRes : await fetch('/api/data');
    if (!dataRes.ok) throw new Error('Server returned ' + dataRes.status);
    simActive = simRes.ok;
    saved = await dataRes.json();
    if (saved.departments) departments = saved.departments;
    if (saved.roles)       roles = saved.roles;
    if (saved.persons)     persons = saved.persons;
    if (saved.roleAssignments) roleAssignments = saved.roleAssignments;
    if (saved.settings)    Object.assign(settings, saved.settings);
    if (saved.salaryBands) salaryBands = saved.salaryBands;
  } catch (e) {
    overlay.innerHTML = `
      <div style="text-align:center;padding:2rem">
        <div style="font-size:1.25rem;font-weight:600;color:#111110;margin-bottom:0.5rem">Cannot connect to server</div>
        <div style="color:#57534e;margin-bottom:1.5rem">Make sure the server is running: <code style="background:#f0eeea;padding:2px 6px;border-radius:4px">npm start</code></div>
        <button onclick="location.reload()" style="padding:0.5rem 1.5rem;background:#1a7a8a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem">Retry</button>
      </div>`;
    return;
  }

  // Show sim banner and poll for state changes
  if (simActive) {
    document.body.classList.add('sim-mode');
  }

  // Show planned-change banner if one is scheduled
  if (saved.plannedChange) {
    const pc = saved.plannedChange;
    const d = new Date(pc.effectiveAt);
    const dateStr = d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' })
      + ' at ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
    document.getElementById('pc-banner-label').textContent =
      `Planned change scheduled: "${pc.label || 'Untitled'}" — effective ${dateStr}`;
    document.body.classList.add('planned-change-mode');
  }
  setInterval(async () => {
    try {
      const r = await fetch('/api/sim-data');
      if (simActive && !r.ok) location.reload(); // sim ended — reload to live data
      if (!simActive && r.ok)  location.reload(); // sim started — reload to show sim data
    } catch (e) { /* ignore network errors */ }
  }, 4000);

// ── Compute metrics ───────────────────────────────────────────────
const activePersons = persons.filter(p => !p.noLongerHired);
const totalRoles    = roles.length;
const vacantRoles   = roles.filter(r => !getPersonForRole(r.id)).length;
const vacantPct     = totalRoles ? Math.round(vacantRoles / totalRoles * 100) : 0;

const genderCounts = { male: 0, female: 0, other: 0, unknown: 0 };
activePersons.forEach(p => { genderCounts[genderKey(p)]++; });

const personPrimaryRole = {};
activePersons.forEach(p => {
  const asgn = roleAssignments.find(a => a.personId === p.id);
  if (asgn) { const r = roles.find(x => x.id === asgn.roleId); if (r) personPrimaryRole[p.id] = r; }
});

const multiRoleCount = activePersons.filter(p => roleAssignments.filter(a => a.personId === p.id).length > 1).length;

const managerRoleIds = new Set(
  roles.filter(r => r.managerRoleId && roles.some(x => x.id === r.managerRoleId)).map(r => r.managerRoleId)
);
const managerCount = [...managerRoleIds].filter(mId => getPersonForRole(mId)).length;

const levelCounts = {};
activePersons.forEach(p => {
  const r = personPrimaryRole[p.id];
  const lvl = r ? (r.level || 'Unleveled') : 'Unassigned';
  levelCounts[lvl] = (levelCounts[lvl] || 0) + 1;
});
const sortedLevels = Object.keys(levelCounts).sort((a, b) => levelSortKey(a) - levelSortKey(b));

const levelGenderData = {};
activePersons.forEach(p => {
  const r = personPrimaryRole[p.id];
  if (!r) return;
  const lvl = r.level || 'Unleveled';
  if (!levelGenderData[lvl]) levelGenderData[lvl] = { male: [], female: [], other: [], unknown: [] };
  levelGenderData[lvl][genderKey(p)].push(p.salary || 0);
});

const allMaleSalaries   = activePersons.filter(p => genderKey(p) === 'male'   && p.salary).map(p => p.salary);
const allFemaleSalaries = activePersons.filter(p => genderKey(p) === 'female' && p.salary).map(p => p.salary);
const overallAvgMale   = avg(allMaleSalaries);
const overallAvgFemale = avg(allFemaleSalaries);
const overallGap = overallAvgMale > 0 ? Math.round((overallAvgMale - overallAvgFemale) / overallAvgMale * 100) : 0;

const isSeniorRole = r => {
  if (!r || !r.level) return false;
  const m = r.level.toUpperCase().match(/C(\d+)/);
  if (m && parseInt(m[1]) >= 5) return true;
  if (/VP|VICE|DIR|CHIEF|CEO|CFO|COO|CTO|CPO/i.test(r.level)) return true;
  return false;
};
const seniorPersons = activePersons.filter(p => { const r = personPrimaryRole[p.id]; return r && isSeniorRole(r); });
const seniorFemaleCount = seniorPersons.filter(p => genderKey(p) === 'female').length;
const seniorFemalePct = seniorPersons.length ? Math.round(seniorFemaleCount / seniorPersons.length * 100) : 0;

const deptStats = departments.map(d => {
  const deptRoles = roles.filter(r => r.departmentId === d.id);
  const deptRoleIds = new Set(deptRoles.map(r => r.id));
  const deptPersonIds = new Set();
  roleAssignments.forEach(a => {
    if (deptRoleIds.has(a.roleId) && activePersons.some(p => p.id === a.personId)) deptPersonIds.add(a.personId);
  });
  const deptPersons = activePersons.filter(p => deptPersonIds.has(p.id));
  const vacant  = deptRoles.filter(r => !getPersonForRole(r.id)).length;
  const payroll = roleAssignments
    .filter(a => deptRoleIds.has(a.roleId))
    .reduce((s, a) => { const p = activePersons.find(x => x.id === a.personId); return s + (p ? (p.salary || 0) * a.percentage / 100 : 0); }, 0);
  const gender = { male: 0, female: 0, other: 0, unknown: 0 };
  deptPersons.forEach(p => { gender[genderKey(p)]++; });
  return { name: d.name, color: d.color, count: deptPersons.length, vacant, payroll, capacity: deptRoles.length, gender };
}).sort((a, b) => b.count - a.count);

const totalPayroll = roleAssignments.reduce((s, a) => {
  const p = activePersons.find(x => x.id === a.personId);
  return s + (p ? (p.salary || 0) * a.percentage / 100 : 0);
}, 0);
const avgSalary = activePersons.length ? totalPayroll / activePersons.length : 0;

const bandHealth = { inBand: [], below: [], above: [] };
const seenPersonBand = new Set();
roleAssignments.forEach(a => {
  const p = activePersons.find(x => x.id === a.personId);
  const r = roles.find(x => x.id === a.roleId);
  if (!p || !r || !p.salary || seenPersonBand.has(p.id)) return;
  seenPersonBand.add(p.id);
  const band = salaryBands[r.level];
  if (!band) return;
  if (p.salary < band.min)      bandHealth.below.push({ name: p.name, salary: p.salary, min: band.min, level: r.level });
  else if (p.salary > band.max) bandHealth.above.push({ name: p.name, salary: p.salary, max: band.max, level: r.level });
  else                           bandHealth.inBand.push({ name: p.name });
});
const bandTotal = bandHealth.inBand.length + bandHealth.below.length + bandHealth.above.length;

const flagGroups = [
  { key: 'salaryReviewNeeded',      label: 'Salary review needed',     color: 'amber' },
  { key: 'performanceReviewNeeded', label: 'Performance review needed', color: 'red'   },
  { key: 'isNew',                   label: 'New employees',             color: 'green' },
  { key: 'onLeave',                 label: 'On leave',                  color: 'blue'  },
];
const totalFlags = flagGroups.slice(0, 2).reduce((n, f) => n + activePersons.filter(p => p[f.key]).length, 0);

const spans = [...managerRoleIds].map(mId => roles.filter(r => r.managerRoleId === mId).length);
const avgSpan = spans.length ? (spans.reduce((a, b) => a + b, 0) / spans.length).toFixed(1) : '—';
const memo = {};
const rootRoles = roles.filter(r => !r.managerRoleId);
const depth = rootRoles.length ? Math.max(...rootRoles.map(r => maxDepth(r.id, memo))) : 0;
const orphanedRoles = roles.filter(r => r.managerRoleId && !roles.some(x => x.id === r.managerRoleId)).length;

// ── Build UI ──────────────────────────────────────────────────────
const grid = document.getElementById('dash-grid');

function makeCard(spanClass, title, badgeText) {
  const el = document.createElement('div');
  el.className = `dash-card ${spanClass}`;
  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  const ttl = document.createElement('span');
  ttl.className = 'card-title';
  ttl.textContent = title;
  hdr.appendChild(ttl);
  if (badgeText != null) {
    const badge = document.createElement('span');
    badge.className = 'card-badge';
    badge.textContent = badgeText;
    hdr.appendChild(badge);
  }
  el.appendChild(hdr);
  return el;
}

function buildDonut(segments, centerText, centerSub) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 36 36');
  svg.setAttribute('class', 'donut-svg');
  const bg = document.createElementNS(ns, 'circle');
  bg.setAttribute('cx','18'); bg.setAttribute('cy','18'); bg.setAttribute('r','15.915');
  bg.setAttribute('fill','none'); bg.setAttribute('stroke','#ece9e3'); bg.setAttribute('stroke-width','4');
  svg.appendChild(bg);
  const total = segments.reduce((s, seg) => s + seg.value, 0);
  if (total === 0) {
    const empty = document.createElementNS(ns, 'circle');
    empty.setAttribute('cx','18'); empty.setAttribute('cy','18'); empty.setAttribute('r','15.915');
    empty.setAttribute('fill','none'); empty.setAttribute('stroke','#e6e4df'); empty.setAttribute('stroke-width','4');
    svg.appendChild(empty);
  } else {
    let offset = 25;
    segments.forEach(seg => {
      if (seg.value === 0) return;
      const pct = (seg.value / total) * 100;
      const circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('cx','18'); circle.setAttribute('cy','18'); circle.setAttribute('r','15.915');
      circle.setAttribute('class','donut-segment');
      circle.setAttribute('stroke', seg.color);
      circle.setAttribute('stroke-dasharray', `${pct} ${100 - pct}`);
      circle.setAttribute('stroke-dashoffset', offset);
      circle.setAttribute('transform','rotate(-90 18 18)');
      svg.appendChild(circle);
      offset -= pct;
    });
  }
  const txt = document.createElementNS(ns, 'text');
  txt.setAttribute('x','18'); txt.setAttribute('y','17');
  txt.setAttribute('class','donut-center-text');
  txt.textContent = centerText;
  svg.appendChild(txt);
  if (centerSub) {
    const sub = document.createElementNS(ns, 'text');
    sub.setAttribute('x','18'); sub.setAttribute('y','21.5');
    sub.setAttribute('class','donut-center-sub');
    sub.textContent = centerSub;
    svg.appendChild(sub);
  }
  return svg;
}

// ── Row 1: KPI Strip ───────────────────────────────────────────────
const kpiDefs = [
  {
    iconBg: '#e6f5f5', iconColor: '#1a7a8a',
    icon: `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="7" cy="5" r="3"/><path d="M2 14c0-3.5 2.2-5.5 5-5.5s5 2 5 5.5"/></svg>`,
    value: activePersons.length,
    label: 'Total Employees',
    sub: `${totalRoles} roles · ${vacantRoles} vacant`,
    subCls: vacantPct > 15 ? 'warn' : 'neutral',
    trendCls: vacantPct > 15 ? 'warn' : 'neutral',
    trendTxt: vacantPct > 15 ? `${vacantPct}% vacant` : 'Staffed'
  },
  {
    iconBg: '#d1fae5', iconColor: '#059669',
    icon: `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="1" y="3" width="14" height="10" rx="1.5"/><line x1="1" y1="7" x2="15" y2="7"/><line x1="5" y1="11" x2="7" y2="11"/></svg>`,
    value: settings.viewOnly ? '—' : fmt(totalPayroll),
    label: 'Monthly Payroll',
    sub: settings.viewOnly ? 'Hidden in view-only' : `Avg ${fmt(avgSalary)}/mo per person`,
    subCls: 'neutral',
    trendCls: 'neutral',
    trendTxt: 'Per month'
  },
  {
    iconBg: '#fef3c7', iconColor: '#d97706',
    icon: `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><line x1="8" y1="8" x2="10.5" y2="10"/></svg>`,
    value: `${vacantPct}%`,
    label: 'Vacancy Rate',
    sub: `${vacantRoles} open role${vacantRoles !== 1 ? 's' : ''}`,
    subCls: vacantPct > 15 ? 'warn' : 'ok',
    trendCls: vacantPct > 15 ? 'warn' : 'ok',
    trendTxt: vacantPct > 15 ? 'Above target' : 'On target'
  },
  {
    iconBg: '#fee2e2', iconColor: '#dc2626',
    icon: `<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 2v5l3 2"/><circle cx="8" cy="9" r="6"/></svg>`,
    value: totalFlags,
    label: 'Open Review Flags',
    sub: totalFlags > 0 ? `${totalFlags} action${totalFlags !== 1 ? 's' : ''} needed` : 'All clear',
    subCls: totalFlags > 0 ? 'danger' : 'ok',
    trendCls: totalFlags > 0 ? 'danger' : 'ok',
    trendTxt: totalFlags > 0 ? 'Action needed' : 'All clear'
  }
];

kpiDefs.forEach(k => {
  const el = document.createElement('div');
  el.className = 'dash-card span-1 kpi-card';
  el.innerHTML = `
    <span class="kpi-trend ${k.trendCls}">${k.trendTxt}</span>
    <div class="kpi-top">
      <div class="kpi-icon" style="background:${k.iconBg};color:${k.iconColor}">${k.icon}</div>
      <div class="kpi-value">${k.value}</div>
    </div>
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-sub ${k.subCls}">${k.sub}</div>
  `;
  grid.appendChild(el);
});

// ── Row 2a: Gender Overview ────────────────────────────────────────
{
  const card = makeCard('span-2', 'Gender Overview', `${activePersons.length} employees`);
  const total = activePersons.length;
  if (total === 0) {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'No employees yet.';
    card.appendChild(nd);
  } else {
    const femalePct = total ? Math.round(genderCounts.female / total * 100) : 0;
    const segments = [
      { label: 'Male',    value: genderCounts.male,    color: '#2a9aaa' },
      { label: 'Female',  value: genderCounts.female,  color: '#e8622a' },
      { label: 'Other',   value: genderCounts.other,   color: '#a8a29e' },
      { label: 'Unknown', value: genderCounts.unknown, color: '#e6e4df' },
    ].filter(s => s.value > 0);
    const allSegs = [
      { label: 'Male',    value: genderCounts.male,    color: '#2a9aaa' },
      { label: 'Female',  value: genderCounts.female,  color: '#e8622a' },
      { label: 'Other',   value: genderCounts.other,   color: '#a8a29e' },
      { label: 'Unknown', value: genderCounts.unknown, color: '#e6e4df' },
    ];
    const wrap = document.createElement('div');
    wrap.className = 'donut-wrap';
    wrap.appendChild(buildDonut(segments, total, 'people'));
    const legend = document.createElement('div');
    legend.className = 'donut-legend';
    allSegs.forEach(s => {
      const pct = total ? Math.round(s.value / total * 100) : 0;
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <span class="legend-dot" style="background:${s.color}"></span>
        <span class="legend-label">${s.label}</span>
        <span class="legend-value">${s.value}</span>
        <span class="legend-pct">${pct}%</span>`;
      legend.appendChild(item);
    });
    wrap.appendChild(legend);
    card.appendChild(wrap);
    const secondary = document.createElement('div');
    secondary.className = 'gender-secondary';
    [
      { label: 'Female share overall', value: `${femalePct}%` },
      { label: 'Female in senior roles (C5+, Dir+)', value: `${seniorFemalePct}% (${seniorFemaleCount} of ${seniorPersons.length})` },
      { label: 'Gender unrecorded', value: `${genderCounts.unknown} employee${genderCounts.unknown !== 1 ? 's' : ''}` },
    ].forEach(s => {
      const row = document.createElement('div');
      row.className = 'gender-stat';
      row.innerHTML = `<span class="gender-stat-label">${s.label}</span><span class="gender-stat-value">${s.value}</span>`;
      secondary.appendChild(row);
    });
    card.appendChild(secondary);
  }
  grid.appendChild(card);
}

// ── Row 2b: Gender Pay Gap ─────────────────────────────────────────
{
  const card = makeCard('span-2', 'Gender Pay Gap', settings.viewOnly ? 'Hidden' : null);
  if (settings.viewOnly) {
    const div = document.createElement('div');
    div.className = 'payroll-hidden';
    div.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><p>Salary data is hidden in view-only mode.</p>`;
    card.appendChild(div);
  } else {
    const headline = document.createElement('div');
    headline.className = 'gap-headline';
    if (allMaleSalaries.length > 0 && allFemaleSalaries.length > 0) {
      headline.innerHTML = `
        <span class="gap-headline-val">${overallGap > 0 ? overallGap + '%' : '0%'}</span>
        <span class="gap-headline-label">overall gender pay gap (men earn ${overallGap}% more on average)</span>`;
    } else {
      headline.innerHTML = `<span class="gap-headline-label" style="color:var(--text-3)">Insufficient data for overall pay gap calculation</span>`;
    }
    card.appendChild(headline);
    const levels = Object.keys(levelGenderData).sort((a, b) => levelSortKey(a) - levelSortKey(b));
    const hasOtherData = levels.some(lvl => levelGenderData[lvl].other.filter(v => v > 0).length >= 2);
    const colCount = hasOtherData ? 5 : 4;
    const tbl = document.createElement('table');
    tbl.className = 'gap-table';
    tbl.innerHTML = `<thead><tr><th>Level</th><th>Avg Male</th><th>Avg Female</th>${hasOtherData ? '<th>Avg Other</th>' : ''}<th>Gap</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    if (levels.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td colspan="${colCount}" class="gap-na">No level data available</td>`;
      tbody.appendChild(tr);
    }
    levels.forEach(lvl => {
      const d = levelGenderData[lvl];
      const tr = document.createElement('tr');
      const mSalaries = d.male.filter(v => v > 0);
      const fSalaries = d.female.filter(v => v > 0);
      const oSalaries = d.other.filter(v => v > 0);
      if (mSalaries.length < 2 || fSalaries.length < 2) {
        tr.innerHTML = `<td>${lvl}</td><td colspan="${colCount - 1}" class="gap-na">Insufficient data (need ≥2 per gender)</td>`;
      } else {
        const avgM = avg(mSalaries), avgF = avg(fSalaries);
        const gap  = avgM > 0 ? Math.round((avgM - avgF) / avgM * 100) : 0;
        const barW = Math.min(Math.abs(gap) * 2, 60);
        const avgOCell = hasOtherData ? `<td>${oSalaries.length >= 2 ? fmt(avg(oSalaries)) : '<span class="gap-na">—</span>'}</td>` : '';
        tr.innerHTML = `
          <td>${lvl}</td>
          <td>${fmt(avgM)}</td>
          <td>${fmt(avgF)}</td>
          ${avgOCell}
          <td><span class="gap-pct ${gap <= 0 ? 'ok' : ''}">${gap > 0 ? '+' : ''}${gap}%</span>${gap > 0 ? `<span class="gap-bar" style="width:${barW}px"></span>` : ''}</td>`;
      }
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    card.appendChild(tbl);
    if (!hasOtherData && genderCounts.other > 0) {
      const note = document.createElement('p');
      note.style.cssText = 'margin:10px 0 0; font-size:12px; color:var(--text-3)';
      note.textContent = `${genderCounts.other} employee${genderCounts.other !== 1 ? 's' : ''} with gender 'Other' — too few per level to calculate averages.`;
      card.appendChild(note);
    }
  }
  grid.appendChild(card);
}

// ── Row 3a: Headcount by Department ───────────────────────────────
{
  const card = makeCard('span-2', 'Headcount by Department', `${departments.length} depts`);
  if (deptStats.length === 0) {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'No departments yet.';
    card.appendChild(nd);
  } else {
    const maxCount = Math.max(...deptStats.map(d => d.capacity), 1);
    const chart = document.createElement('div');
    chart.className = 'bar-chart';
    deptStats.forEach(d => {
      const group = document.createElement('div');
      group.className = 'bar-row-group';
      const fillPct = maxCount > 0 ? (d.count / maxCount * 100) : 0;
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.style.paddingBottom = '2px';
      const nameEl = document.createElement('div');
      nameEl.className = 'bar-dept-name';
      nameEl.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:5px;vertical-align:middle;flex-shrink:0"></span>${d.name}`;
      const track = document.createElement('div');
      track.className = 'bar-track';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = fillPct + '%';
      fill.style.background = 'var(--accent)';
      fill.style.opacity = '0.75';
      track.appendChild(fill);
      const val = document.createElement('div');
      val.className = 'bar-value';
      val.textContent = d.count + (d.vacant > 0 ? ` (+${d.vacant})` : '');
      row.appendChild(nameEl); row.appendChild(track); row.appendChild(val);
      group.appendChild(row);
      const total = d.gender.male + d.gender.female + d.gender.other + d.gender.unknown;
      if (total > 0) {
        const subRow = document.createElement('div');
        subRow.className = 'bar-row-sub';
        subRow.style.cssText = 'display:flex; align-items:center; gap:10px; padding-bottom:6px;';
        const spacer = document.createElement('div');
        spacer.className = 'bar-dept-name';
        spacer.style.visibility = 'hidden';
        spacer.textContent = '\u00a0';
        const stackWrap = document.createElement('div');
        stackWrap.style.cssText = 'flex:1; display:flex; height:4px; border-radius:99px; overflow:hidden; background:var(--bg);';
        [
          { key: 'male',    color: '#2a9aaa' },
          { key: 'female',  color: '#e8622a' },
          { key: 'other',   color: '#a8a29e' },
          { key: 'unknown', color: '#e6e4df' },
        ].forEach(s => {
          if (d.gender[s.key] === 0) return;
          const seg = document.createElement('div');
          seg.className = 'stacked-seg';
          seg.style.width = (d.gender[s.key] / total * 100) + '%';
          seg.style.background = s.color;
          stackWrap.appendChild(seg);
        });
        const mPct = Math.round(d.gender.male / total * 100);
        const fPct = Math.round(d.gender.female / total * 100);
        const oPct = Math.round(d.gender.other / total * 100);
        const label = document.createElement('span');
        label.style.cssText = 'font-size:10.5px; color:var(--text-3); white-space:nowrap;';
        label.textContent = `${mPct}% M · ${fPct}% F` + (d.gender.other > 0 ? ` · ${oPct}% O` : '');
        subRow.appendChild(spacer); subRow.appendChild(stackWrap); subRow.appendChild(label);
        group.appendChild(subRow);
      }
      chart.appendChild(group);
    });
    card.appendChild(chart);
  }
  grid.appendChild(card);
}

// ── Row 3b: Level Distribution ─────────────────────────────────────
{
  const card = makeCard('span-2', 'Level Distribution', `${sortedLevels.length} level${sortedLevels.length !== 1 ? 's' : ''}`);
  if (sortedLevels.length === 0) {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'No level data yet.';
    card.appendChild(nd);
  } else {
    const maxC = Math.max(...Object.values(levelCounts), 1);
    const chart = document.createElement('div');
    chart.className = 'bar-chart';
    sortedLevels.forEach(lvl => {
      const cnt = levelCounts[lvl];
      const pct = cnt / maxC * 100;
      const row = document.createElement('div');
      row.className = 'bar-row';
      const nameEl = document.createElement('div');
      nameEl.className = 'bar-dept-name';
      nameEl.style.minWidth = '70px';
      nameEl.textContent = lvl;
      const track = document.createElement('div');
      track.className = 'bar-track';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = 'linear-gradient(90deg, #0f3d4a, #2a9aaa)';
      track.appendChild(fill);
      const val = document.createElement('div');
      val.className = 'bar-value';
      val.textContent = cnt;
      row.appendChild(nameEl); row.appendChild(track); row.appendChild(val);
      chart.appendChild(row);
    });
    card.appendChild(chart);
  }
  grid.appendChild(card);
}

// ── Row 4a: Payroll by Department ──────────────────────────────────
{
  const card = makeCard('span-2', 'Payroll by Department', settings.viewOnly ? null : fmtFull(totalPayroll) + ' total');
  if (settings.viewOnly) {
    const div = document.createElement('div');
    div.className = 'payroll-hidden';
    div.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><p>Salary data is hidden in view-only mode.</p>`;
    card.appendChild(div);
  } else if (deptStats.length === 0) {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'No department data yet.';
    card.appendChild(nd);
  } else {
    const maxPay = Math.max(...deptStats.map(d => d.payroll), 1);
    const chart = document.createElement('div');
    chart.className = 'bar-chart';
    [...deptStats].sort((a, b) => b.payroll - a.payroll).forEach(d => {
      const pct = d.payroll / maxPay * 100;
      const share = totalPayroll > 0 ? Math.round(d.payroll / totalPayroll * 100) : 0;
      const row = document.createElement('div');
      row.className = 'bar-row';
      const nameEl = document.createElement('div');
      nameEl.className = 'bar-dept-name';
      nameEl.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:5px;vertical-align:middle"></span>${d.name}`;
      const track = document.createElement('div');
      track.className = 'bar-track';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = 'var(--accent)';
      fill.style.opacity = '0.75';
      track.appendChild(fill);
      const val = document.createElement('div');
      val.className = 'bar-value';
      val.style.minWidth = '90px';
      val.textContent = `${fmt(d.payroll)} (${share}%)`;
      row.appendChild(nameEl); row.appendChild(track); row.appendChild(val);
      chart.appendChild(row);
    });
    card.appendChild(chart);
    const summary = document.createElement('div');
    summary.className = 'payroll-summary';
    summary.innerHTML = `
      <div class="payroll-summary-item">
        <div class="payroll-summary-label">Total monthly</div>
        <div class="payroll-summary-value">${fmtFull(totalPayroll)}</div>
      </div>
      <div class="payroll-summary-item">
        <div class="payroll-summary-label">Avg per person</div>
        <div class="payroll-summary-value">${fmt(avgSalary)}/mo</div>
      </div>`;
    card.appendChild(summary);
  }
  grid.appendChild(card);
}

// ── Row 4b: Status Flags ───────────────────────────────────────────
{
  const card = makeCard('span-2', 'Status Flags', totalFlags > 0 ? `${totalFlags} action${totalFlags !== 1 ? 's' : ''} needed` : 'All clear');
  if (activePersons.length === 0) {
    const nd = document.createElement('div'); nd.className = 'no-data'; nd.textContent = 'No employees yet.';
    card.appendChild(nd);
  } else {
    flagGroups.forEach(f => {
      const flagged = activePersons.filter(p => p[f.key]);
      const row = document.createElement('div');
      row.className = 'flag-row';
      row.innerHTML = `
        <span class="flag-pill ${f.color}">${f.label}</span>
        <span class="flag-count${flagged.length > 0 ? ' nonzero' : ''}">${flagged.length}</span>
        ${flagged.length > 0 ? '<span class="flag-chevron">›</span>' : '<span class="flag-chevron"></span>'}`;
      const namesDiv = document.createElement('div');
      namesDiv.className = 'flag-names';
      flagged.forEach(p => {
        const chip = document.createElement('span');
        chip.className = 'flag-name-chip';
        chip.textContent = p.name;
        namesDiv.appendChild(chip);
      });
      if (flagged.length > 0) {
        row.addEventListener('click', () => {
          row.classList.toggle('open');
          namesDiv.classList.toggle('visible');
        });
      }
      card.appendChild(row);
      if (flagged.length > 0) card.appendChild(namesDiv);
    });
  }
  grid.appendChild(card);
}

// ── Row 5a: Salary Band Health ─────────────────────────────────────
{
  const inCount = bandHealth.inBand.length;
  const belowCount = bandHealth.below.length;
  const aboveCount = bandHealth.above.length;
  const card = makeCard('span-2', 'Salary Band Health', bandTotal > 0 ? `${Math.round(inCount / bandTotal * 100)}% in band` : null);
  if (bandTotal === 0) {
    const nd = document.createElement('div');
    nd.className = 'no-data';
    nd.textContent = Object.keys(salaryBands).length === 0 ? 'No salary bands configured yet.' : 'No employees with salary band data.';
    card.appendChild(nd);
  } else {
    const segments = [
      { label: 'In band',    value: inCount,    color: '#22c55e' },
      { label: 'Below band', value: belowCount, color: '#f59e0b' },
      { label: 'Above band', value: aboveCount, color: '#ef4444' },
    ];
    const wrap = document.createElement('div');
    wrap.className = 'donut-wrap';
    wrap.appendChild(buildDonut(segments, inCount, 'in band'));
    const legend = document.createElement('div');
    legend.className = 'donut-legend';
    segments.forEach(s => {
      const pct = bandTotal ? Math.round(s.value / bandTotal * 100) : 0;
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <span class="legend-dot" style="background:${s.color}"></span>
        <span class="legend-label">${s.label}</span>
        <span class="legend-value">${s.value}</span>
        <span class="legend-pct">${pct}%</span>`;
      legend.appendChild(item);
    });
    wrap.appendChild(legend);
    card.appendChild(wrap);
    const offenders = [...bandHealth.below, ...bandHealth.above];
    if (offenders.length > 0 && !settings.viewOnly) {
      const title = document.createElement('div');
      title.style.cssText = 'font-size:10.5px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; padding-top:4px;';
      title.textContent = 'Out-of-band employees';
      card.appendChild(title);
      const list = document.createElement('div');
      list.className = 'band-offenders';
      offenders.slice(0, 5).forEach(o => {
        const row = document.createElement('div');
        row.className = 'band-offender-row';
        const isBelow = bandHealth.below.includes(o);
        row.innerHTML = `
          <span class="band-offender-name">${o.name}</span>
          <span style="font-size:11px;color:var(--text-3);text-align:center">${o.level || ''}</span>
          <span class="band-offender-tag ${isBelow ? 'below' : 'above'}">${isBelow ? 'Below' : 'Above'} band</span>`;
        list.appendChild(row);
      });
      if (offenders.length > 5) {
        const more = document.createElement('div');
        more.style.cssText = 'font-size:11.5px; color:var(--text-3); padding:4px 0;';
        more.textContent = `+${offenders.length - 5} more`;
        list.appendChild(more);
      }
      card.appendChild(list);
    }
  }
  grid.appendChild(card);
}

// ── Row 5b: Org Health ─────────────────────────────────────────────
{
  const card = makeCard('span-2', 'Org Health', null);
  const tiles = [
    { label: 'Active employees',       value: activePersons.length,    cls: '' },
    { label: 'Avg span of control',    value: avgSpan !== '—' ? avgSpan + ' reports' : '—', cls: '' },
    { label: 'Hierarchy depth',        value: depth ? depth + (depth === 1 ? ' level' : ' levels') : '—', cls: '' },
    { label: 'Vacant roles',           value: `${vacantRoles} / ${totalRoles}`, cls: vacantPct > 20 ? 'warn' : vacantPct > 0 ? '' : 'ok' },
    { label: 'Orphaned roles',         value: orphanedRoles, cls: orphanedRoles > 0 ? 'warn' : 'ok' },
    { label: 'Managers',               value: managerCount, cls: '' },
    { label: 'Multi-role employees',   value: multiRoleCount, cls: multiRoleCount > 0 ? 'warn' : '' },
    { label: 'Departments',            value: departments.length, cls: '' },
    { label: 'Salary bands set up',    value: Object.keys(salaryBands).length, cls: Object.keys(salaryBands).length === 0 ? 'warn' : 'ok' },
  ];
  const tileGrid = document.createElement('div');
  tileGrid.className = 'org-health-grid';
  tiles.forEach(t => {
    const tile = document.createElement('div');
    tile.className = 'org-stat-tile';
    tile.innerHTML = `<div class="org-stat-label">${t.label}</div><div class="org-stat-value ${t.cls}">${t.value}</div>`;
    tileGrid.appendChild(tile);
  });
  card.appendChild(tileGrid);
  grid.appendChild(card);
}

// ── Last updated ───────────────────────────────────────────────────
document.getElementById('last-updated').textContent = simActive
  ? `Simulation data · refreshed ${new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' })}`
  : `Data as of ${new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}`;

  overlay.style.display = 'none';
} // end init()
init();
</script>
