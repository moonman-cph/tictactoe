// ── App State ────────────────────────────────────────────────────
let appData = { departments:[], roles:[], persons:[], roleAssignments:[], salaryBands:{}, settings:{} };
let savedReports  = [];
let activeConfig  = null;   // current report config (template + options)
let activeChart   = null;   // Chart.js instance
let activeSavedId = null;   // ID of the saved report currently open (null if unsaved run)
let configOpen    = false;

// ── Helpers ──────────────────────────────────────────────────────
function getActivePersons(filterStatus) {
  const all = appData.persons;
  return filterStatus === 'all' ? all : all.filter(p => !p.noLongerHired);
}
function getPrimaryRoleForPerson(personId) {
  const a = appData.roleAssignments.find(a => a.personId === personId);
  return a ? appData.roles.find(r => r.id === a.roleId) || null : null;
}
function getDeptForRole(role) {
  if (!role) return null;
  return appData.departments.find(d => d.id === (role.departmentId || role.department)) || null;
}
function genderKey(p) {
  const g = (p.gender || '').toLowerCase().trim();
  if (g === 'male' || g === 'm') return 'male';
  if (g === 'female' || g === 'f') return 'female';
  if (g === '') return 'unknown';
  return 'other';
}
function ageFromDOB(dob) {
  if (!dob) return null;
  const diff = Date.now() - new Date(dob).getTime();
  return Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
}
function ageBucket(age) {
  if (age == null) return 'Unknown';
  if (age < 25)  return 'Under 25';
  if (age < 35)  return '25–34';
  if (age < 45)  return '35–44';
  if (age < 55)  return '45–54';
  return '55+';
}
function levelNum(lvl) {
  if (!lvl) return 99;
  const m = lvl.toUpperCase().match(/[CL](\d+)/);
  return m ? parseInt(m[1], 10) : 99;
}
function levelSortKey(lvl) { return LEVEL_ORDER.indexOf(lvl) >= 0 ? LEVEL_ORDER.indexOf(lvl) : 99; }
function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(s.length / 2);
  return s.length % 2 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }
function percentile(arr, p) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  return s[Math.max(0, Math.ceil(s.length * p / 100) - 1)];
}
function stddev(arr) {
  if (arr.length < 2) return 0;
  const m = avg(arr);
  return Math.sqrt(arr.reduce((sum, v) => sum + (v - m) ** 2, 0) / (arr.length - 1));
}
function cv(arr) { const m = avg(arr); return m ? stddev(arr) / m * 100 : 0; }
function fmt(n) {
  if (!n) return '0';
  const cur = appData.settings.currency || 'DKK';
  const r = Math.round(n);
  if (r >= 1000000) return cur === 'EUR' ? '€'+(r/1000000).toFixed(1)+'M' : (r/1000000).toFixed(1)+'M kr';
  if (r >= 1000)    return cur === 'EUR' ? '€'+Math.round(r/1000)+'k' : Math.round(r/1000)+'k kr';
  return cur === 'EUR' ? '€'+r.toLocaleString() : r.toLocaleString('da-DK')+' kr';
}
function generateId() { return typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'visible' + (type ? ' '+type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2800);
}

// ── Storage ──────────────────────────────────────────────────────
function getStorageKey() { return `reports-saved-${window.__currentUser?.orgId || 'default'}`; }
function loadSavedReports() {
  try {
    const raw = localStorage.getItem(getStorageKey());
    if (!raw) return [];
    const obj = JSON.parse(raw);
    return Array.isArray(obj.reports) ? obj.reports : [];
  } catch { return []; }
}
function persistSavedReports() {
  localStorage.setItem(getStorageKey(), JSON.stringify({ version: 1, reports: savedReports }));
}
function addSavedReport(config) {
  if (savedReports.length >= 50) { showToast('Limit of 50 saved reports reached.', 'error'); return null; }
  const r = { ...config, id: generateId(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
  savedReports.unshift(r);
  persistSavedReports();
  return r;
}
function updateSavedReport(id, config) {
  const i = savedReports.findIndex(r => r.id === id);
  if (i < 0) return;
  savedReports[i] = { ...savedReports[i], ...config, updatedAt: new Date().toISOString() };
  persistSavedReports();
}
function deleteSavedReport(id) {
  savedReports = savedReports.filter(r => r.id !== id);
  persistSavedReports();
}

function destroyChart() {

}

function makeTickColor()   { return '#57534e'; }

// ── Sidebar Rendering ─────────────────────────────────────────────
function renderSidebar() {
  const categories = ['headcount','compensation','diversity','org'];
  let html = '';
  for (const cat of categories) {
    const tpls = TEMPLATES.filter(t => t.category === cat);
    html += `<div class="sidebar-cat-label">${CATEGORY_INFO[cat].label}<span class="sidebar-cat-count">${tpls.length}</span></div>`;
    for (const t of tpls) {
      const active = activeConfig && activeConfig.templateId === t.id ? ' active' : '';
      html += `<div class="tpl-item${active}" onclick="openConfig('${t.id}',null)" title="${escHtml(t.desc)}">
        ${escHtml(t.name)}
        ${t.isNew ? '<span class="tpl-new-badge">New</span>' : ''}
        <span class="tpl-type-badge ${t.type}">${t.type === 'trend' ? 'trend' : 'snap'}</span>
      </div>`;
    }
  }
  // Saved reports
  html += `<div class="sidebar-divider"></div>
  <div class="sidebar-cat-label">Saved Reports <span style="font-size:10px;color:var(--text-3)">(${savedReports.length})</span></div>`;
  if (savedReports.length === 0) {
    html += `<div class="saved-empty-hint">Run a report and click Save to store it here.</div>`;
  } else {
    for (const r of savedReports) {

// ── Demo History Seeder ───────────────────────────────────────────

async function seedDemoHistory() {
  const confirmed = confirm(
    'Seed 18-month demo history?\n\n' +
    'This will REPLACE the entire changelog with synthetic data ' +
    '(120 employees distributed over 18 months, pay reviews, 8 ghost employees for attrition testing).\n\n' +
    'A backup will be saved as changelog.backup.json (file mode only).\n\n' +
    'Click OK to proceed.'
  );
  if (!confirmed) return;

  const btn = document.getElementById('seed-demo-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Seeding…'; }

  try {
    const res  = await fetch('/api/dev/seed-demo-history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ monthsBack: 18 }) });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || res.statusText);

    const s = json.summary;
    showToast(`Demo history seeded: ${s.personsSeeded} employees over ${s.monthsBack} months, ${s.salaryUpdateEvents} salary events, ${s.ghostEmployeesAdded} attrition cases.`);

    // Refresh any open trend report
    if (activeConfig) runReport();
  } catch (e) {
    alert('Seed failed: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Seed Demo History'; }
  }
}

// ── Config Panel ──────────────────────────────────────────────────
function openConfig(templateId, existingConfig) {
  activeSavedId = null;
  const isCustom = templateId === null;
  const tpl = isCustom ? null : TEMPLATES.find(t => t.id === templateId);

  document.getElementById('config-panel-title').textContent = isCustom ? 'Custom Report' : (tpl ? tpl.name : 'Configure');
  document.getElementById('config-body').innerHTML = isCustom ? buildCustomForm({}) : buildTemplateForm(tpl, existingConfig?.options || tpl?.def || {});

  // Store pending config
  activeConfig = { templateId: templateId, options: existingConfig?.options || tpl?.def || {}, name: existingConfig?.name || '' };

  document.getElementById('config-panel').classList.remove('hidden');
  document.getElementById('save-report-btn').style.display = '';
  configOpen = true;
  renderSidebar();
}

function openSavedConfig(id) {
  const r = savedReports.find(s => s.id === id);
  if (!r) return;
  activeSavedId = id;
  openConfig(r.templateId, r);
}

function openCurrentConfig() {
  if (!activeConfig) return;
  openConfig(activeConfig.templateId, activeConfig);
}

function closeConfig() {
  document.getElementById('config-panel').classList.add('hidden');
  configOpen = false;
  renderSidebar();
}

function buildTemplateForm(tpl, currentOptions) {
  if (!tpl) return '';
  let html = `<div class="config-field"><div class="config-label">Template</div><div class="config-desc">${escHtml(tpl.desc)}</div></div>`;
  for (const opt of (tpl.opts || [])) {
    if (opt.type === 'select') {
      html += `<div class="config-field">
        <label class="config-label" for="cfg-${opt.k}">${escHtml(opt.label)}</label>
        <select class="config-select" id="cfg-${opt.k}" data-key="${opt.k}" onchange="onConfigChange()">
          ${opt.choices.map(c => `<option value="${c.v}" ${currentOptions[opt.k] == c.v ? 'selected':''}>${escHtml(c.l)}</option>`).join('')}
        </select></div>`;
    } else if (opt.type === 'toggle') {
      const checked = currentOptions[opt.k] ? 'checked' : '';
      html += `<div class="config-field config-toggle-row">
        <label class="config-label">${escHtml(opt.label)}</label>
        <label class="config-toggle"><input type="checkbox" id="cfg-${opt.k}" data-key="${opt.k}" ${checked} onchange="onConfigChange()"><span class="config-toggle-slider"></span></label>
      </div>`;
    } else if (opt.type === 'date') {
      html += `<div class="config-field">
        <label class="config-label" for="cfg-${opt.k}">${escHtml(opt.label)}</label>
        <input type="date" class="config-input" id="cfg-${opt.k}" data-key="${opt.k}" value="${escHtml(currentOptions[opt.k] || '')}" onchange="onConfigChange()">
      </div>`;
    }
  }
  return html;
}

function buildCustomForm(opts) {
  const entities = Object.entries(FIELD_MANIFEST).map(([k, v]) => `<option value="${k}" ${opts.entity === k ? 'selected':''}>${v.label}</option>`).join('');
  const fields = opts.entity ? buildFieldOptions(opts.entity, opts.field) : '<option value="">— select entity first —</option>';
  const aggs = opts.entity && opts.field ? buildAggOptions(opts.entity, opts.field, opts.aggregation) : '<option value="">— select field first —</option>';
  const dims = opts.entity && opts.field ? buildDimOptions(opts.aggregation, opts.dimension) : '<option value="">— select aggregation first —</option>';

  return `
    <div class="custom-step">
      <div class="custom-step-num">Step 1</div>
      <div class="custom-step-label">What to measure</div>
      <select class="config-select" id="cfg-entity" onchange="onCustomEntityChange()">
        <option value="">— select entity —</option>${entities}
      </select>
    </div>
    <div class="custom-step ${opts.entity ? '' : 'custom-step-disabled'}">
      <div class="custom-step-num">Step 2</div>
      <div class="custom-step-label">Which field</div>
      <select class="config-select" id="cfg-field" onchange="onCustomFieldChange()">
        ${fields}
      </select>
    </div>
    <div class="custom-step ${opts.field ? '' : 'custom-step-disabled'}">
      <div class="custom-step-num">Step 3</div>
      <div class="custom-step-label">Aggregation</div>
      <select class="config-select" id="cfg-aggregation" onchange="onCustomAggChange()">
        ${aggs}
      </select>
    </div>
    <div class="custom-step ${opts.aggregation ? '' : 'custom-step-disabled'}">
      <div class="custom-step-num">Step 4</div>
      <div class="custom-step-label">Group by</div>
      <select class="config-select" id="cfg-dimension" onchange="onConfigChange()">
        ${dims}
      </select>
    </div>`;
}

function buildFieldOptions(entity, selectedField) {
  const fields = FIELD_MANIFEST[entity]?.fields || {};
  return Object.entries(fields).map(([k, v]) => `<option value="${k}" ${selectedField === k ? 'selected':''}>${v.label}</option>`).join('');
}
function buildAggOptions(entity, field, selectedAgg) {
  const f = FIELD_MANIFEST[entity]?.fields?.[field];
  if (!f) return '';
  const AGG_LABELS = { count:'Count', avg:'Average', sum:'Sum', median:'Median', min:'Minimum', max:'Maximum' };
  return f.aggs.map(a => `<option value="${a}" ${selectedAgg === a ? 'selected':''}>${AGG_LABELS[a]}</option>`).join('');
}
function buildDimOptions(agg, selectedDim) {
  return DIMENSION_OPTIONS.map(d => `<option value="${d.v}" ${selectedDim === d.v ? 'selected':''}>${d.l}</option>`).join('');
}

function onConfigChange() {
  if (!activeConfig) return;
  activeConfig.options = collectFormValues();
}
function onCustomEntityChange() {
  const entity = document.getElementById('cfg-entity').value;
  if (!activeConfig) activeConfig = { templateId: null, options: {}, name: '' };
  activeConfig.options = { entity, field:'', aggregation:'', dimension:'' };
  document.getElementById('config-body').innerHTML = buildCustomForm(activeConfig.options);
}
function onCustomFieldChange() {
  const entity = document.getElementById('cfg-entity')?.value || '';
  const field  = document.getElementById('cfg-field')?.value || '';
  if (!activeConfig) return;
  activeConfig.options = { entity, field, aggregation:'', dimension:'' };
  document.getElementById('config-body').innerHTML = buildCustomForm(activeConfig.options);
}
function onCustomAggChange() {
  const entity = document.getElementById('cfg-entity')?.value || '';
  const field  = document.getElementById('cfg-field')?.value || '';
  const agg    = document.getElementById('cfg-aggregation')?.value || '';
  if (!activeConfig) return;
  activeConfig.options = { entity, field, aggregation: agg, dimension: '' };
  document.getElementById('config-body').innerHTML = buildCustomForm(activeConfig.options);
}
function collectFormValues() {
  const opts = {};
  document.querySelectorAll('#config-body [data-key]').forEach(el => {
    opts[el.dataset.key] = el.type === 'checkbox' ? el.checked : el.value;
  });
  // For custom, also collect step fields without data-key
  const entity = document.getElementById('cfg-entity')?.value;
  const field  = document.getElementById('cfg-field')?.value;
  const agg    = document.getElementById('cfg-aggregation')?.value;
  const dim    = document.getElementById('cfg-dimension')?.value;
  if (entity !== undefined) {
    opts.entity = entity; opts.field = field || ''; opts.aggregation = agg || ''; opts.dimension = dim || '';
  }
  return opts;
}

// ── Run Report ────────────────────────────────────────────────────
async function runReport() {
  const opts = collectFormValues();
  if (activeConfig) activeConfig.options = opts;

  const btn = document.getElementById('run-report-btn');
  btn.disabled = true; btn.textContent = 'Running…';

  setView('report');
  showChartLoading();

  try {
    const result = await executeReport(activeConfig);
    renderResult(result);
    // Set title and badge
    const tpl = activeConfig.templateId ? TEMPLATES.find(t => t.id === activeConfig.templateId) : null;
    const name = activeConfig.name || (tpl ? tpl.name : 'Custom Report');
    document.getElementById('report-title').textContent = name;
    const cat  = activeConfig.category || tpl?.category || 'custom';
    const ci   = CATEGORY_INFO[cat] || CATEGORY_INFO.custom;
    const badge = document.getElementById('report-category-badge');
    badge.textContent = ci.label; badge.className = 'saved-card-cat ' + ci.cls;
    // Show/hide save button (hide if already saved and unchanged)
    const editBtn = document.getElementById('save-as-btn');
    editBtn.textContent = activeSavedId ? 'Update' : 'Save';
    editBtn.onclick = activeSavedId ? updateSaved : openSaveDialog;
  } catch (e) {
    showChartError(e.message || 'Failed to run report.');
  } finally {
    btn.disabled = false; btn.textContent = 'Run Report';
  }
  renderSidebar();
}

async function runSaved(id) {
  const r = savedReports.find(s => s.id === id);
  if (!r) return;
  activeSavedId = id;
  activeConfig  = { ...r };
  closeConfig();
  setView('report');
  showChartLoading();
  try {
    const result = await executeReport(activeConfig);
    renderResult(result);
    document.getElementById('report-title').textContent = r.name;
    const ci = CATEGORY_INFO[r.category] || CATEGORY_INFO.custom;
    const badge = document.getElementById('report-category-badge');
    badge.textContent = ci.label; badge.className = 'saved-card-cat ' + ci.cls;
    document.getElementById('save-as-btn').textContent = 'Update';
    document.getElementById('save-as-btn').onclick = updateSaved;
  } catch(e) {
    showChartError(e.message || 'Failed to run report.');
  }
  renderSidebar();
}

function showChartLoading() {
  document.getElementById('chart-canvas').style.display = 'none';
  document.getElementById('kpi-wrap').style.display = 'none';
  document.getElementById('chart-summary').style.display = 'none';

// ── Snapshot: Headcount ───────────────────────────────────────────
function execHcTotal(opts) {
  const persons = getActivePersons(opts.filterStatus || 'active');
  const counts = { male:0, female:0, other:0, unknown:0 };
  persons.forEach(p => counts[genderKey(p)]++);
  const total = persons.length;
  return {
    type: 'doughnut',
    data: {
      labels: ['Male','Female','Other','Unknown'],
      datasets: [{ data: [counts.male, counts.female, counts.other, counts.unknown], backgroundColor: Object.values(GENDER_COLORS), borderWidth: 2, borderColor: '#fff' }]
    },
    options: donutOptions(`Total: ${total}`),
    summary: [{ label:'Total Employees', value:total }, { label:'Male', value:counts.male }, { label:'Female', value:counts.female }, { label:'Other/Unknown', value:counts.other+counts.unknown }],
    summaryHeaders: ['Metric','Count'],
  };
}

function execHcByDept(opts) {
  const persons = getActivePersons(opts.filterStatus || 'active');
  const deptCounts = {};
  appData.departments.forEach(d => { deptCounts[d.id] = { name:d.name, count:0, vacant:0 }; });
  persons.forEach(p => {
    const r = getPrimaryRoleForPerson(p.id);
    const dId = r?.departmentId || r?.department;
    if (dId && deptCounts[dId]) deptCounts[dId].count++;
  });
  if (opts.showVacant) {
    appData.roles.forEach(r => {
      const dId = r.departmentId || r.department;
      const person = appData.roleAssignments.find(a => a.roleId === r.id) ? appData.persons.find(p => appData.roleAssignments.find(a => a.roleId === r.id && a.personId === p.id)) : null;
      if (!person && dId && deptCounts[dId]) deptCounts[dId].vacant++;
    });
  }
  let entries = Object.values(deptCounts).filter(d => d.count > 0 || d.vacant > 0);
  entries.sort(opts.sortBy === 'alpha' ? (a,b) => a.name.localeCompare(b.name) : (a,b) => b.count - a.count);
  const labels  = entries.map(e => e.name);
  const datasets = [{ label:'Employees', data:entries.map(e => e.count), backgroundColor:CHART_COLORS[0]+'cc', borderRadius:4 }];
  if (opts.showVacant) datasets.push({ label:'Vacant', data:entries.map(e => e.vacant), backgroundColor:CHART_COLORS[1]+'cc', borderRadius:4 });
  return {
    type:'bar',
    data:{ labels, datasets },
    options: barOptions(true, opts.showVacant),
    summary: [
      ...entries.map(e => ({ label:e.name, value:`${e.count} (${persons.length ? Math.round(e.count/persons.length*100) : 0}%)${opts.showVacant ? ` · ${e.vacant} vacant` : ''}` })),
      { label:'Total', value:persons.length },
    ],
    summaryHeaders:['Department','Employees'],
  };
}

function execHcByLevel(opts) {
  const persons = getActivePersons(opts.filterStatus || 'active');
  const counts = {};
  persons.forEach(p => {
    const r = getPrimaryRoleForPerson(p.id);
    const lvl = r ? (r.level || 'Unleveled') : 'Unassigned';
    counts[lvl] = (counts[lvl] || 0) + 1;
  });
  const labels = LEVEL_ORDER.filter(l => counts[l]);
  const data   = labels.map(l => counts[l]);
  const total  = persons.length;
  return {
    type:'bar',
    data:{ labels, datasets:[{ label:'Employees', data, backgroundColor:CHART_COLORS[0]+'cc', borderRadius:4 }] },
    options: barOptions(false),
    summary: [
      ...labels.map((l,i) => ({ label:l, value:`${data[i]} (${total ? Math.round(data[i]/total*100) : 0}%)` })),
      { label:'Total', value:total },
    ],
    summaryHeaders:['Level','Employees'],
  };
}

function execHcVacancy(opts) {
  const deptMap = {};
  appData.departments.forEach(d => { deptMap[d.id] = { name:d.name, filled:0, vacant:0 }; });
  appData.roles.forEach(r => {
    const dId = r.departmentId || r.department;
    if (!dId || !deptMap[dId]) return;
    const filled = appData.roleAssignments.some(a => a.roleId === r.id && appData.persons.find(p => p.id === a.personId && !p.noLongerHired));
    if (filled) deptMap[dId].filled++; else deptMap[dId].vacant++;
  });
  const entries = Object.values(deptMap).filter(d => d.filled + d.vacant > 0);
  entries.sort((a,b) => b.vacant - a.vacant);
  return {
    type:'bar',
    data:{ labels:entries.map(e=>e.name), datasets:[
      { label:'Filled', data:entries.map(e=>e.filled), backgroundColor:CHART_COLORS[0]+'cc', borderRadius:4 },
      { label:'Vacant', data:entries.map(e=>e.vacant), backgroundColor:CHART_COLORS[1]+'cc', borderRadius:4 },
    ]},
    options: barOptions(true, true),
    summary: entries.map(e => ({ label:e.name, value:`${e.filled} filled · ${e.vacant} vacant (${e.filled+e.vacant > 0 ? Math.round(e.vacant/(e.filled+e.vacant)*100) : 0}% vacant)` })),
    summaryHeaders:['Department','Status'],
  };
}

// ── Trend: Headcount ──────────────────────────────────────────────
async function execHcTrend(opts) {
  const creates = await fetchChangelogAll({ entityType:'person', operation:'CREATE' });
  const deletes = await fetchChangelogAll({ entityType:'person', operation:'DELETE' });
  // Also count noLongerHired field changes: true = termination (−1), false = reinstatement (+1)
  const softTerms = await fetchChangelogAll({ entityType:'person', field:'noLongerHired' });
  const events = [
    ...creates.map(e => ({ ts: e.timestamp, delta: +1 })),
    ...deletes.map(e => ({ ts: e.timestamp, delta: -1 })),
    ...softTerms.map(e => ({ ts: e.timestamp, delta: e.newValue === true ? -1 : +1 })),
  ].sort((a,b) => a.ts.localeCompare(b.ts));

  if (!events.length) {
    return { kpi:[{ label:'No headcount history found', value:'—' }, { label:'Tip', value:'Use "Seed Demo History" to populate 18 months of synthetic data.' }], summary:[], summaryHeaders:[] };
  }

  const from  = opts.dateFrom || (events.length ? events[0].ts.slice(0,10) : null);
  const to    = opts.dateTo   || new Date().toISOString().slice(0,10);
  const bucket = opts.bucket || 'month';
  const buckets = generateBuckets(bucket, from, to);

  const series = buckets.map(b => {
    let count = 0;
    events.forEach(e => { if (e.ts <= b.end) count += e.delta; });
    return count < 0 ? 0 : count;
  });

  return {
    type:'line',
    data:{ labels:buckets.map(b=>b.label), datasets:[{ label:'Headcount', data:series, borderColor:CHART_COLORS[0], backgroundColor:CHART_COLORS[0]+'22', fill:true, tension:0.3, pointRadius:3 }]},
    options: lineOptions('Headcount'),
    summary: buckets.map((b,i) => ({ label:b.label, value:series[i] })),
    summaryHeaders:['Period','Headcount'],
  };
}

async function execHcNewJoiners(opts) {
  const [creates, deletes, softTerms] = await Promise.all([
    fetchChangelogAll({ entityType:'person', operation:'CREATE', from: opts.dateFrom || undefined, to: opts.dateTo || undefined }),
    fetchChangelogAll({ entityType:'person', operation:'DELETE', from: opts.dateFrom || undefined, to: opts.dateTo || undefined }),
    fetchChangelogAll({ entityType:'person', field:'noLongerHired', from: opts.dateFrom || undefined, to: opts.dateTo || undefined }),
  ]);
  const leaverEvents = [
    ...deletes,
    ...softTerms.filter(e => e.newValue === true),
  ];
  creates.sort((a,b) => a.timestamp.localeCompare(b.timestamp));
  const allEvents = [...creates, ...leaverEvents];
  const from  = opts.dateFrom || (allEvents.length ? allEvents.reduce((a,b) => a.timestamp < b.timestamp ? a : b).timestamp.slice(0,10) : new Date(Date.now() - 365*24*60*60*1000).toISOString().slice(0,10));
  const to    = opts.dateTo   || new Date().toISOString().slice(0,10);
  const bucket = opts.bucket || 'month';
  const buckets = generateBuckets(bucket, from, to);

  if (!creates.length && !leaverEvents.length) {
    return { kpi:[{ label:'No hiring data found', value:'—' }, { label:'Tip', value:'Use "Seed Demo History" to populate synthetic data.' }], summary:[], summaryHeaders:[] };
  }

  const hires   = buckets.map(b => creates.filter(e => e.timestamp >= b.start && e.timestamp <= b.end).length);
  const leavers = buckets.map(b => leaverEvents.filter(e => e.timestamp >= b.start && e.timestamp <= b.end).length);
  const net     = hires.map((h,i) => h - leavers[i]);

  return {
    type:'bar',
    data:{ labels:buckets.map(b=>b.label), datasets:[
      { label:'New Hires',  data:hires,   backgroundColor:CHART_COLORS[2]+'cc', borderRadius:4 },
      { label:'Leavers',    data:leavers, backgroundColor:CHART_COLORS[1]+'cc', borderRadius:4 },
      { label:'Net Change', data:net,     type:'line', borderColor:CHART_COLORS[0], backgroundColor:'transparent', pointRadius:3, tension:0.3, yAxisID:'y' },
    ]},
    options: { ...barOptions(false, true), plugins: { ...barOptions(false,true).plugins, legend:{ display:true, position:'top', labels:{ boxWidth:12, color:makeTickColor() } } } },
    summary: buckets.map((b,i) => ({ label:b.label, value:`+${hires[i]} hires · −${leavers[i]} leavers · net ${net[i] >= 0 ? '+' : ''}${net[i]}` })),
    summaryHeaders:['Period','Movement'],
  };
}

function execPayGenderGap(opts) {
  const persons = getActivePersons('active').filter(p => p.salary);
  const data = {};
  persons.forEach(p => {
    const r = getPrimaryRoleForPerson(p.id);
    if (!r) return;
    const lvl = r.level || 'Unleveled';
    if (opts.filterLevel && lvl !== opts.filterLevel) return;
    if (!data[lvl]) data[lvl] = { male:[], female:[], other:[] };
    const g = genderKey(p);
    if (g === 'unknown') return;
    data[lvl][g].push(p.salary);
  });
  const levels = Object.keys(data).sort((a,b) => levelSortKey(a)-levelSortKey(b));
  // Compute gaps per level
  let widestGap = 0, widestGapLevel = '';
  levels.forEach(l => {
    const m = avg(data[l].male), f = avg(data[l].female);
    if (m && f) {
      const gap = Math.abs(m - f) / Math.max(m, f) * 100;
      if (gap > widestGap) { widestGap = gap; widestGapLevel = l; }
    }
  });
  return {
    type:'bar',
    data:{ labels:levels, datasets:[
      { label:'Male',   data:levels.map(l => avg(data[l].male)   || null), backgroundColor:GENDER_COLORS.male+'cc',   borderRadius:4 },
      { label:'Female', data:levels.map(l => avg(data[l].female) || null), backgroundColor:GENDER_COLORS.female+'cc', borderRadius:4 },
      { label:'Other',  data:levels.map(l => avg(data[l].other)  || null), backgroundColor:GENDER_COLORS.other+'cc',  borderRadius:4 },
    ]},
    options: barOptions(false, true, 'Avg Salary'),
    summary: levels.map(l => {
      const m = avg(data[l].male), f = avg(data[l].female);
      const gap = (m && f) ? Math.round(Math.abs(m - f) / Math.max(m, f) * 100) : null;
      return { label:l, value:`M: ${fmt(m)} · F: ${fmt(f)}${gap !== null ? ` · gap ${gap}%` : ''}` };
    }),
    summaryHeaders:['Level','Avg Salary by Gender'],
    _insight: widestGapLevel ? `Widest gender pay gap at ${widestGapLevel}: ${Math.round(widestGap)}% difference. Male avg: ${fmt(avg(data[widestGapLevel].male))}, female avg: ${fmt(avg(data[widestGapLevel].female))}.` : undefined,
  };
}

async function execPayBudgetTrend(opts) {
  // Reconstruct salary state at each bucket end by replaying salary changes
  const salaryChanges = await fetchChangelogAll({ entityType:'person', field:'salary' });
  salaryChanges.sort((a,b) => a.timestamp.localeCompare(b.timestamp));

  if (!salaryChanges.length) {
    return { kpi:[{ label:'No salary history found', value:'—' }, { label:'Tip', value:'Use "Seed Demo History" to populate synthetic payroll data.' }], summary:[], summaryHeaders:[] };
  }

  const from   = opts.dateFrom || (salaryChanges.length ? salaryChanges[0].timestamp.slice(0,10) : new Date(Date.now()-365*24*60*60*1000).toISOString().slice(0,10));
  const to     = opts.dateTo   || new Date().toISOString().slice(0,10);
  const bucket = opts.bucket   || 'month';
  const buckets = generateBuckets(bucket, from, to);

  // Build per-person salary at each point in time
  const currentSalaries = {}; // personId → salary (from current data)
  getActivePersons('all').forEach(p => { if (p.salary) currentSalaries[p.id] = p.salary; });

  // Replay backwards from current state, or replay forwards
  // Replay forward: start with earliest known salary, apply changes
  const personSalaryAtTime = {}; // personId → salary at time T
  // Seed from first appearance in changes
  salaryChanges.forEach(e => {
    if (!e.entityId) return;
    if (!personSalaryAtTime[e.entityId]) {
      personSalaryAtTime[e.entityId] = parseFloat(e.oldValue) || 0;
    }
  });

  const series = buckets.map(b => {
    // Clone state at start
    const state = { ...personSalaryAtTime };
    salaryChanges.filter(e => e.timestamp <= b.end).forEach(e => {
      if (e.entityId) state[e.entityId] = parseFloat(e.newValue) || 0;
    });
    return Object.values(state).filter(v => v > 0).reduce((sum, v) => sum + v, 0);
  });

  return {
    type:'line',
    data:{ labels:buckets.map(b=>b.label), datasets:[{ label:'Total Monthly Payroll', data:series.map(v=>Math.round(v)), borderColor:CHART_COLORS[0], backgroundColor:CHART_COLORS[0]+'22', fill:true, tension:0.3, pointRadius:3 }]},
    options: lineOptions(fmt(series[series.length-1])+' total'),
    summary: buckets.map((b,i) => ({ label:b.label, value:fmt(series[i]) })),
    summaryHeaders:['Period','Total Payroll'],
  };
}

function execOrgSpan(opts) {
  const managerIds = new Set();
  appData.roles.forEach(r => { if (r.managerRoleId) managerIds.add(r.managerRoleId); });
  const spans = {};
  managerIds.forEach(mId => {
    const count = appData.roles.filter(r => r.managerRoleId === mId).length;
    const b = count === 0 ? '0' : count <= 2 ? '1–2' : count <= 5 ? '3–5' : count <= 10 ? '6–10' : '11+';
    spans[b] = (spans[b] || 0) + 1;
  });
  const order = ['0','1–2','3–5','6–10','11+'];
  const labels = order.filter(b => spans[b]);
  return {
    type:'bar',

function execOrgDepth(opts) {
  const memo = {};
  function maxDepth(roleId) {
    if (memo[roleId] !== undefined) return memo[roleId];
    const children = appData.roles.filter(r => r.managerRoleId === roleId);
    memo[roleId] = children.length ? 1 + Math.max(...children.map(c => maxDepth(c.id))) : 1;
    return memo[roleId];
  }
  const roots = appData.roles.filter(r => !r.managerRoleId || !appData.roles.find(x => x.id === r.managerRoleId));
  const deptDepths = {};
  appData.departments.forEach(d => { deptDepths[d.id] = { name:d.name, depth:0 }; });
  roots.forEach(r => {
    const d = parseInt(maxDepth(r.id), 10);
    const dId = r.departmentId || r.department;
    if (dId && deptDepths[dId]) deptDepths[dId].depth = Math.max(deptDepths[dId].depth, d);
  });
  const entries = Object.values(deptDepths).filter(d => d.depth > 0).sort((a,b) => b.depth-a.depth);
  return {
    type:'bar',
    data:{ labels:entries.map(e=>e.name), datasets:[{ label:'Hierarchy Depth', data:entries.map(e=>e.depth), backgroundColor:CHART_COLORS[0]+'cc', borderRadius:4 }]},
    options: barOptions(true),
    summary: entries.map(e => ({ label:e.name, value:`${e.depth} levels` })),
    summaryHeaders:['Department','Max Depth'],
  };
}

async function execHcAttritionRate(opts) {
  const [deletes, softTerms] = await Promise.all([
    fetchChangelogAll({ entityType:'person', operation:'DELETE', from: opts.dateFrom || undefined, to: opts.dateTo || undefined }),
    fetchChangelogAll({ entityType:'person', field:'noLongerHired', from: opts.dateFrom || undefined, to: opts.dateTo || undefined }),
  ]);
  const termEvents = [
    ...deletes.map(e => ({ ts: e.timestamp, entityId: e.entityId, oldValue: e.oldValue })),
    ...softTerms.filter(e => e.newValue === true).map(e => ({ ts: e.timestamp, entityId: e.entityId, oldValue: null })),
  ];

  if (!termEvents.length) {
    return { kpi:[{ label:'No attrition events found', value:'—' }, { label:'Tip', value:'Use "Seed Demo History" to populate synthetic attrition data.' }], summary:[], summaryHeaders:[] };
  }

  const from = opts.dateFrom || termEvents.reduce((a,b) => a.ts < b.ts ? a : b).ts.slice(0,10);
  const to   = opts.dateTo   || new Date().toISOString().slice(0,10);

  // Date range in months for annualisation
  const fromD = new Date(from), toD = new Date(to);
  const periodMonths = Math.max(1, (toD.getFullYear() - fromD.getFullYear()) * 12 + (toD.getMonth() - fromD.getMonth()));

  // Count terminations per department
  const deptTerms = {};
  const deptHeadcount = {};
  appData.departments.forEach(d => { deptTerms[d.name] = 0; deptHeadcount[d.name] = 0; });

  // Current headcount per dept
  getActivePersons('active').forEach(p => {
    const r = getPrimaryRoleForPerson(p.id);
    const dept = appData.departments.find(d => d.id === (r?.departmentId || r?.department));
    if (dept) deptHeadcount[dept.name] = (deptHeadcount[dept.name] || 0) + 1;
  });

  // Attribute terminations to departments
  termEvents.filter(e => e.ts >= from + 'T00:00:00Z' && e.ts <= to + 'T23:59:59Z').forEach(e => {
    // Try to find dept from current persons (soft terms), then from oldValue (hard deletes)
    const currentPerson = appData.persons.find(p => String(p.id) === String(e.entityId));
    let deptName = null;
    if (currentPerson) {
      const r = getPrimaryRoleForPerson(currentPerson.id);
      const dept = appData.departments.find(d => d.id === (r?.departmentId || r?.department));
      if (dept) deptName = dept.name;
    }
    if (!deptName && e.oldValue?.departmentId) {
      const dept = appData.departments.find(d => d.id === e.oldValue.departmentId);
      if (dept) deptName = dept.name;
    }
    if (!deptName) deptName = 'Unknown';
    if (!(deptName in deptTerms)) deptTerms[deptName] = 0;
    deptTerms[deptName]++;
  });

  let entries = Object.entries(deptTerms)
    .map(([name, terms]) => {
      const hc = deptHeadcount[name] || 0;
      const avgHc = hc + terms; // approximate avg headcount during period
      const rate = avgHc ? (terms / avgHc) * (12 / periodMonths) * 100 : 0;
      return { name, terms, hc, rate };
    })
    .filter(e => e.terms > 0 || e.hc > 0)
    .sort((a,b) => b.rate - a.rate);

  const totalTerms = entries.reduce((s,e) => s+e.terms, 0);
  const totalHc = entries.reduce((s,e) => s+e.hc, 0);
  const orgRate = totalHc ? (totalTerms / (totalHc + totalTerms)) * (12 / periodMonths) * 100 : 0;

  return {
    type:'bar',
    data:{ labels:entries.map(e=>e.name), datasets:[{
      label:'Annualised Attrition %',
      data:entries.map(e=>Math.round(e.rate * 10) / 10),
      backgroundColor:entries.map(e => e.rate > 20 ? CHART_COLORS[6]+'cc' : e.rate > 10 ? CHART_COLORS[3]+'cc' : CHART_COLORS[2]+'cc'),
      borderRadius:4,
    }]},
    options: barOptions(true, false, 'Attrition %'),
    summary: [
      ...entries.map(e => ({ label:e.name, value:`${e.rate.toFixed(1)}% (${e.terms} leavers, ${e.hc} current headcount)` })),
      { label:'Org average', value:`${orgRate.toFixed(1)}% (${totalTerms} total leavers)` },
    ],
    summaryHeaders:['Department','Attrition Rate'],
    _insight: entries.length > 0 ? `Highest attrition: ${entries[0].name} at ${entries[0].rate.toFixed(1)}% annualised. Org average: ${orgRate.toFixed(1)}%. ${orgRate > 20 ? 'Above 20% is considered high — review retention.' : orgRate > 10 ? 'Moderate attrition — monitor trends.' : 'Healthy attrition level.'}` : undefined,
  };
}

function execPayLevelSpread(opts) {
  const data = {};
  getActivePersons('active').forEach(p => {
    if (!p.salary) return;
    const r = getPrimaryRoleForPerson(p.id);
    const lvl = r ? (r.level || 'Unleveled') : 'Unassigned';
    if (!data[lvl]) data[lvl] = [];
    data[lvl].push(p.salary);
  });
  const bands = appData.salaryBands || {};
  const levels = Object.keys(data).sort((a,b) => levelSortKey(a)-levelSortKey(b)).filter(l => data[l].length >= 2);

  if (!levels.length) {
    return { kpi:[{ label:'No salary data', value:'—' }, { label:'Note', value:'At least 2 employees per level are needed to compute spread.' }], summary:[], summaryHeaders:[] };
  }

  // Build floating bar chart: spacer (transparent) + IQR bar
  const p25s    = levels.map(l => percentile(data[l], 25));
  const medians = levels.map(l => median(data[l]));
  const p75s    = levels.map(l => percentile(data[l], 75));
  const iqrs    = levels.map((l,i) => p75s[i] - p25s[i]);
  const cvs     = levels.map(l => cv(data[l]));

  const insight = (() => {
    const worstIdx = cvs.indexOf(Math.max(...cvs));
    const worst = cvs[worstIdx];
    if (worst > 20) return `Pay spread is high at ${levels[worstIdx]} (CV ${Math.round(worst)}%) — employees at the same level have very different salaries. Consider a pay equity review.`;
    if (worst > 12) return `Moderate pay spread at ${levels[worstIdx]} (CV ${Math.round(worst)}%). Within normal range but worth monitoring.`;
    return `Pay spread is consistent across all levels (max CV ${Math.round(worst)}%). Good pay equity signal.`;
  })();

  return {
    type:'bar',
    data:{ labels:levels, datasets:[
      { label:'Min (spacer)', data:p25s, backgroundColor:'transparent', borderWidth:0, stack:'spread' },
      { label:'P25–P75 Range', data:iqrs, backgroundColor:CHART_COLORS[0]+'88', borderRadius:4, stack:'spread' },
      { label:'Median', data:medians, type:'line', borderColor:CHART_COLORS[1], backgroundColor:'transparent', pointRadius:5, pointBackgroundColor:CHART_COLORS[1], tension:0, yAxisID:'y' },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, position:'top', labels:{ filter: i => i.text !== 'Min (spacer)', boxWidth:12, color:makeTickColor() } }, tooltip:{ callbacks:{ label: ctx => ctx.dataset.label === 'Min (spacer)' ? null : ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y ?? ctx.parsed.x)}` } } },
      scales:{ x:{ stacked:true, grid:{color:makeGridColor()}, ticks:{color:makeTickColor()} }, y:{ stacked:false, grid:{color:makeGridColor()}, ticks:{color:makeTickColor(), callback: v => fmt(v) }, title:{display:true,text:'Salary',color:makeTickColor()} } },
    },
    summary: levels.map((l,i) => {
      const band = bands[l];
      const bandStr = band ? ` · band ${fmt(band.min)}–${fmt(band.max)}` : '';
      return { label:l, value:`Median ${fmt(medians[i])} · P25 ${fmt(p25s[i])} · P75 ${fmt(p75s[i])} · CV ${Math.round(cvs[i])}%${bandStr}` };
    }),
    summaryHeaders:['Level','Pay Spread'],
    _insight: insight,
  };
}

async function execOrgLayeringTrend(opts) {
  const roleCreates = await fetchChangelogAll({ entityType:'role', operation:'CREATE', from: opts.dateFrom || undefined, to: opts.dateTo || undefined });
  const roleDeletes = await fetchChangelogAll({ entityType:'role', operation:'DELETE', from: opts.dateFrom || undefined, to: opts.dateTo || undefined });

  if (!roleCreates.length) {
    return { kpi:[{ label:'No role history found', value:'—' }, { label:'Tip', value:'This report requires role creation/deletion events in the audit log.' }], summary:[], summaryHeaders:[] };
  }

  const allRoleEvents = [...roleCreates, ...roleDeletes];
  const from  = opts.dateFrom || allRoleEvents.reduce((a,b) => a.timestamp < b.timestamp ? a : b).timestamp.slice(0,10);
  const to    = opts.dateTo   || new Date().toISOString().slice(0,10);
  const bucket = opts.bucket || 'quarter';
  const buckets = generateBuckets(bucket, from, to);

  // Track manager vs IC roles: a role is a "manager role" if it is referenced as managerRoleId by another role
  // We approximate by tracking roles whose newValue has managerRoleId set (they are ICs) vs roles that are referenced
  // Simpler: use snapshot — for each bucket end, count current manager role IDs
  // Since we don't have full snapshots, use the current state and assume it's roughly representative
  const managerRoleIds = new Set();
  appData.roles.forEach(r => { if (r.managerRoleId) managerRoleIds.add(r.managerRoleId); });
  const currentManagers = [...managerRoleIds].filter(mId => appData.roleAssignments.some(a => a.roleId === mId)).length;
  const currentTotal = getActivePersons('active').length;
  const currentICs = Math.max(0, currentTotal - currentManagers);
  const currentRatio = currentManagers ? Math.round(currentICs / currentManagers * 10) / 10 : 0;
  const currentMgrPct = currentTotal ? Math.round(currentManagers / currentTotal * 100) : 0;

  // For trend: approximate by interpolating role creation events
  // Count manager roles created per bucket (roles that will eventually become manager roles)
  // This is a rough approximation — proper calculation needs full state replay
  const series = buckets.map(b => {
    const created = roleCreates.filter(e => e.timestamp >= b.start && e.timestamp <= b.end).length;
    const deleted = roleDeletes.filter(e => e.timestamp >= b.start && e.timestamp <= b.end).length;
    return { created, deleted, net: created - deleted };
  });

  // Show running cumulative headcount and estimated manager %
  let runningTotal = currentTotal - series.reduce((s,b) => s+b.net, 0);
  const totalSeries = series.map(b => { runningTotal += b.net; return Math.max(0, runningTotal); });
  // Manager % approximated as constant (current snapshot) — with a note
  const mgrPctSeries = totalSeries.map(() => currentMgrPct);

  return {
    type:'line',
    data:{ labels:buckets.map(b=>b.label), datasets:[
      { label:'Total Roles', data:totalSeries, borderColor:CHART_COLORS[0], backgroundColor:CHART_COLORS[0]+'22', fill:true, tension:0.3, pointRadius:3, yAxisID:'y' },
      { label:'Manager %', data:mgrPctSeries, borderColor:CHART_COLORS[1], borderDash:[4,3], tension:0, pointRadius:0, yAxisID:'y2' },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:true, position:'top', labels:{ boxWidth:12, color:makeTickColor() } }, tooltip:{ callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}${ctx.dataset.yAxisID === 'y2' ? '%' : ''}` } } },
      scales:{
        x:{ grid:{color:makeGridColor()}, ticks:{color:makeTickColor()} },
        y:{ grid:{color:makeGridColor()}, ticks:{color:makeTickColor()}, beginAtZero:true, title:{display:true,text:'Headcount',color:makeTickColor()} },
        y2:{ type:'linear', position:'right', grid:{drawOnChartArea:false}, ticks:{color:makeTickColor(), callback: v => v+'%' }, title:{display:true,text:'Manager %',color:makeTickColor()} },
      },
    },
    summary:[
      { label:'Current headcount', value:String(currentTotal) },
      { label:'Manager roles', value:`${currentManagers} (${currentMgrPct}%)` },
      { label:'IC:Manager ratio', value:currentManagers ? `${currentRatio}:1` : 'N/A' },
    ],
    summaryHeaders:['Metric','Value'],
    _insight: `Current IC:Manager ratio is ${currentRatio}:1 (${currentManagers} managers, ${currentICs} ICs). ${currentRatio < 4 ? 'Low ratio — organisation may be top-heavy with management overhead.' : currentRatio > 10 ? 'High ratio — managers may have wide spans of control.' : 'Ratio is within a healthy range (4–10:1).'}`,
  };
}

// ── Custom Builder Executor ───────────────────────────────────────
async function execCustom(opts) {
  const { entity, field, aggregation, dimension } = opts;
  if (!entity || !field || !aggregation) throw new Error('Please complete all custom report steps.');

  // Get base data
  let rows = [];
  if (entity === 'person') {
    rows = getActivePersons('active').map(p => {
      const role = getPrimaryRoleForPerson(p.id);
      const dept = getDeptForRole(role);
      return {
        value: field === '*' ? 1 : (p[field] ?? null),
        dimDepartment: dept?.name || 'Unknown',
        dimLevel:      role?.level || 'Unleveled',
        dimGender:     GENDER_LABELS[genderKey(p)] || 'Unknown',
        dimCountry:    p.country || 'Unknown',
      };
    }).filter(r => {
      if (field === 'salary') return r.value != null && r.value > 0;
      if (['salaryReviewNeeded','performanceReviewNeeded','isNew','onLeave'].includes(field)) return r.value === true;
      return true;
    });
  } else if (entity === 'role') {
    rows = appData.roles.map(r => {
      const dept = getDeptForRole(r);
      return { value: field === '*' ? 1 : (r[field] ?? null), dimDepartment: dept?.name || 'Unknown', dimLevel: r.level || 'Unleveled', dimGender:'N/A', dimCountry:'N/A' };
    });
  }

  const DIM_KEY = { department:'dimDepartment', level:'dimLevel', gender:'dimGender', country:'dimCountry' };
  const dimKey = DIM_KEY[dimension] || null;

  if (!dimKey) {
    // No grouping — single aggregate
    const values = rows.map(r => parseFloat(r.value) || 0).filter(v => !isNaN(v));
    const result = aggregate(values, aggregation);
    const aggLabel = aggregation.charAt(0).toUpperCase() + aggregation.slice(1);
    const fieldInfo = FIELD_MANIFEST[entity]?.fields?.[field];
    return { kpi:[{ label:`${aggLabel} of ${fieldInfo?.label || field}`, value:String(result) }], summary:[], summaryHeaders:['Metric','Value'] };
  }

  // Group by dimension
  const groups = {};
  rows.forEach(r => {
    const key = String(r[dimKey] || 'Unknown');
    if (!groups[key]) groups[key] = [];
    groups[key].push(parseFloat(r.value) || 0);
  });
  const entries = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);
  const labels  = entries.map(e => e[0]);
  const data    = entries.map(e => aggregate(e[1], aggregation));
  const aggLabel = aggregation.charAt(0).toUpperCase() + aggregation.slice(1);

  return {
    type: aggregation === 'count' ? 'bar' : 'bar',
    data:{ labels, datasets:[{ label:aggLabel, data, backgroundColor:CHART_COLORS[0]+'cc', borderRadius:4 }]},
    options: barOptions(entries.length > 5, false),
    summary: entries.map((e,i) => ({ label:e[0], value:String(data[i]) })),
    summaryHeaders:[dimension, aggLabel],
  };
}

function aggregate(values, agg) {
  if (!values.length) return 0;
  switch(agg) {
    case 'count':  return values.length;
    case 'sum':    return Math.round(values.reduce((a,b)=>a+b,0));
    case 'avg':    return Math.round(avg(values));
    case 'median': return Math.round(median(values));
    case 'min':    return Math.min(...values);
    case 'max':    return Math.max(...values);
    default:       return values.length;
  }
}

// ── Chart Rendering ───────────────────────────────────────────────
function renderResult(result) {
  const canvas   = document.getElementById('chart-canvas');
  const kpiWrap  = document.getElementById('kpi-wrap');
  const placeholder = document.getElementById('chart-placeholder');
  const summaryEl   = document.getElementById('chart-summary');

  destroyChart();
  placeholder.style.display = 'none';

  if (result.kpi) {
    // KPI tile view
    canvas.style.display = 'none';
    kpiWrap.style.display = 'flex';
    kpiWrap.innerHTML = result.kpi.map(k => `<div class="kpi-card"><div class="kpi-card-value">${escHtml(k.value)}</div><div class="kpi-card-label">${escHtml(k.label)}</div></div>`).join('');
  } else {
    kpiWrap.style.display = 'none';
    canvas.style.display = 'block';
    activeChart = new Chart(canvas, { type:result.type, data:result.data, options:result.options });
  }

  // Insight callout (between chart and summary)
  let insightEl = document.getElementById('report-insight');
  if (result._insight) {
    if (!insightEl) {
      insightEl = document.createElement('div');
      insightEl.id = 'report-insight';
      summaryEl.parentNode.insertBefore(insightEl, summaryEl);
    }
    insightEl.className = 'report-insight';
    insightEl.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="7" x2="8" y2="11"/><circle cx="8" cy="5" r="0.5" fill="currentColor" stroke="none"/></svg><span>${escHtml(result._insight)}</span>`;
    insightEl.style.display = 'flex';
  } else if (insightEl) {
    insightEl.style.display = 'none';
  }

  // Summary table
  if (result.summary && result.summary.length) {
    summaryEl.style.display = '';
    summaryEl.innerHTML = `<table class="summary-table">
      <thead><tr>${(result.summaryHeaders||['Label','Value']).map(h=>`<th>${escHtml(h)}</th>`).join('')}</tr></thead>
      <tbody>${result.summary.map(r=>`<tr>${['label','value'].map(k=>`<td>${escHtml(String(r[k]??''))}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>`;
  } else {
    summaryEl.style.display = 'none';
  }
}

function barOptions(horizontal, stacked, yLabel) {
  return {
    responsive:true, maintainAspectRatio:false,
    indexAxis: horizontal ? 'y' : 'x',
    plugins:{
      legend:{ display:!!stacked, position:'top', labels:{ boxWidth:12, color:makeTickColor() } },
      tooltip:{ callbacks:{ label: ctx => ` ${ctx.parsed.y ?? ctx.parsed.x}` } },
    },
    scales:{
      x:{ grid:{color:makeGridColor()}, ticks:{color:makeTickColor()}, stacked:!!stacked },
      y:{ grid:{color:makeGridColor()}, ticks:{color:makeTickColor()}, stacked:!!stacked, title: yLabel ? {display:true,text:yLabel,color:makeTickColor()} : undefined },
    },
  };
}

function lineOptions(subtitle) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ display:false },
      tooltip:{ callbacks:{ label: ctx => ` ${ctx.parsed.y}` } },
      subtitle: subtitle ? { display:true, text:subtitle, color:makeTickColor(), font:{size:11} } : undefined,
    },
    scales:{
      x:{ grid:{color:makeGridColor()}, ticks:{color:makeTickColor()} },
      y:{ grid:{color:makeGridColor()}, ticks:{color:makeTickColor()}, beginAtZero:true },
    },
  };
}

function donutOptions(centerText) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ display:true, position:'right', labels:{ boxWidth:12, color:makeTickColor() } },
      tooltip:{ callbacks:{ label: ctx => ` ${ctx.label}: ${ctx.parsed} (${ctx.dataset.data.reduce((a,b)=>a+b,0) ? Math.round(ctx.parsed/ctx.dataset.data.reduce((a,b)=>a+b,0)*100) : 0}%)` } },
    },
    cutout:'60%',
  };
}

// ── Changelog Fetching ────────────────────────────────────────────
async function fetchChangelogAll(params) {
  const PAGE = 1000;
  let offset = 0, all = [];
  while (true) {
    const p = {};
    if (params.entityType) p.entityType = params.entityType;
    if (params.operation)  p.operation  = params.operation;
    if (params.field)      p.field      = params.field;
    if (params.from)       p.from       = params.from;
    if (params.to)         p.to         = params.to;
    p.limit  = PAGE;
    p.offset = offset;
    const qs = new URLSearchParams(p);
    try {
      const res = await fetch(`/api/changelog?${qs}`);
      if (!res.ok) throw new Error('Changelog API error ' + res.status);
      const { total, entries } = await res.json();
      if (!entries || entries.length === 0) break;
      all = all.concat(entries);
      if (all.length >= total) break;
      if (params.from && entries.length > 0 && entries[entries.length-1].timestamp < params.from) break;
      offset += PAGE;
    } catch(e) {
      break; // Fail gracefully — return what we have
    }
  }
  return all;
}

function generateBuckets(bucket, from, to) {
  if (!from) from = new Date(Date.now() - 365*24*60*60*1000).toISOString().slice(0,10);
  if (!to)   to   = new Date().toISOString().slice(0,10);
  const buckets = [];
  let cur = new Date(from + 'T00:00:00Z');
  const end = new Date(to + 'T23:59:59Z');

  while (cur <= end) {
    let label, startISO, endISO, next;
    const y = cur.getUTCFullYear(), m = cur.getUTCMonth(), d = cur.getUTCDate();
    if (bucket === 'week') {
      next = new Date(cur); next.setUTCDate(next.getUTCDate() + 7);
      label = `${y}-W${String(Math.ceil(d/7)).padStart(2,'0')}`;
      startISO = cur.toISOString();
      endISO   = new Date(next.getTime()-1).toISOString();
    } else if (bucket === 'quarter') {
      const q = Math.floor(m/3);
      next = new Date(Date.UTC(y, q*3+3, 1));
      label = `${y} Q${q+1}`;
      startISO = new Date(Date.UTC(y, q*3, 1)).toISOString();
      endISO   = new Date(next.getTime()-1).toISOString();
    } else { // month
      next = new Date(Date.UTC(y, m+1, 1));
      label = cur.toLocaleDateString(undefined, { month:'short', year:'numeric', timeZone:'UTC' });
      startISO = new Date(Date.UTC(y, m, 1)).toISOString();
      endISO   = new Date(next.getTime()-1).toISOString();
    }
    buckets.push({ label, start:startISO, end:endISO });
    cur = next;
    if (bucket === 'quarter' || bucket === 'month') {
      // Snap to bucket start to avoid drift
      const yy = cur.getUTCFullYear(), mm = cur.getUTCMonth();
      cur = new Date(Date.UTC(yy, mm, 1));
    }
    if (buckets.length > 200) break; // Safety cap
  }
  return buckets;
}

// ── Save Dialog ───────────────────────────────────────────────────
function openSaveDialog() {
  if (!activeConfig) return;
  const input = document.getElementById('save-name-input');
  const tpl = activeConfig.templateId ? TEMPLATES.find(t => t.id === activeConfig.templateId) : null;
  input.value = activeConfig.name || (tpl ? tpl.name : 'Custom Report');
  document.getElementById('save-dialog').classList.remove('hidden');
  setTimeout(() => { input.select(); input.focus(); }, 50);
}
function closeSaveDialog() { document.getElementById('save-dialog').classList.add('hidden'); }
function confirmSave() {
  const name = document.getElementById('save-name-input').value.trim();
  if (!name) return;
  closeSaveDialog();
  const tpl = activeConfig.templateId ? TEMPLATES.find(t => t.id === activeConfig.templateId) : null;
  const config = {
    ...activeConfig,
    name,
    category: activeConfig.category || tpl?.category || 'custom',
    reportType: activeConfig.reportType || tpl?.type || 'snapshot',
  };
  const saved = addSavedReport(config);
  if (saved) {
    activeSavedId = saved.id;
    activeConfig  = { ...saved };
    document.getElementById('report-title').textContent = name;
    document.getElementById('save-as-btn').textContent  = 'Update';
    document.getElementById('save-as-btn').onclick      = updateSaved;
    renderSidebar();
    renderSavedGrid();
    showToast('Report saved!', 'success');
  }
}
function updateSaved() {
  if (!activeSavedId || !activeConfig) return;
  updateSavedReport(activeSavedId, activeConfig);
  renderSidebar();
  renderSavedGrid();
  showToast('Report updated!', 'success');
}

function confirmDelete(id) {
  const r = savedReports.find(s => s.id === id);
  if (!r) return;
  if (!confirm(`Delete "${r.name}"?`)) return;
  deleteSavedReport(id);
  if (activeSavedId === id) {
    activeSavedId = null;
    activeConfig  = null;
    setView('grid');
    closeConfig();
  }
  renderSidebar();
  renderSavedGrid();
  showToast('Report deleted.');
}

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  const overlay = document.getElementById('loading-overlay');
  let simActive = false;
  let rawData = null;

  try {
    const simRes = await fetch('/api/sim-data');
    const dataRes = simRes.ok ? simRes : await fetch('/api/data');
    if (!dataRes.ok) throw new Error('Server returned ' + dataRes.status);
    simActive = simRes.ok;
    rawData = await dataRes.json();
    if (rawData.departments)    appData.departments    = rawData.departments;
    if (rawData.roles)          appData.roles          = rawData.roles;
    if (rawData.persons)        appData.persons        = rawData.persons;
    if (rawData.roleAssignments) appData.roleAssignments = rawData.roleAssignments;
    if (rawData.settings)       Object.assign(appData.settings, rawData.settings);
    if (rawData.salaryBands)    appData.salaryBands    = rawData.salaryBands;
  } catch(e) {
    overlay.innerHTML = `<div style="text-align:center;padding:2rem">
      <div style="font-size:1.25rem;font-weight:600;color:#111110;margin-bottom:0.5rem">Cannot connect to server</div>
      <div style="color:#57534e;margin-bottom:1.5rem">Make sure the server is running: <code style="background:#f0eeea;padding:2px 6px;border-radius:4px">npm start</code></div>
      <button onclick="location.reload()" style="padding:0.5rem 1.5rem;background:#1a7a8a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:1rem">Retry</button>
    </div>`;
    return;
  }

  if (simActive) document.body.classList.add('sim-mode');
  if (rawData?.plannedChange) {
    const pc = rawData.plannedChange;
    const d = new Date(pc.effectiveAt);
    const msUntil = d - Date.now();
    if (msUntil > 0) {
      document.getElementById('pc-banner-label').textContent = `Planned change: "${pc.label||'Untitled'}" — effective ${d.toLocaleDateString()}`;
      document.body.classList.add('planned-change-mode');
      // Reload when the change takes effect so the banner disappears and data refreshes
      setTimeout(() => location.reload(), msUntil + 1000);
    }
  }

  // Wait for auth
  if (!window.__currentUser) {
    await new Promise(resolve => document.addEventListener('auth:ready', resolve, { once: true }));
  }
  const rights = (window.__currentUser && window.__currentUser.rights) || [];
  const canViewSalaries = rights.includes('view_salaries');

  // Disable compensation templates if no salary access
  if (!canViewSalaries) {
    TEMPLATES.filter(t => t.requiresRight === 'view_salaries').forEach(t => {
      t._locked = true;
    });
  }

  setupChartDefaults();
  savedReports = loadSavedReports();
  renderSidebar();
  renderSavedGrid();
  setView('grid');
  overlay.style.display = 'none';
}

init();
</script>
